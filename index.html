      <div id="tut-banner"></div>
      <div id="tut-finger"><div class="ring"></div><img class="hand" src="assets/sprites/ui_hand.webp" alt="" draggable="false"></div>
    </div>

    <!-- adventure progression: the STAGE-CLEAR SEQUENCE (grid sweep → Well Done layer →
         Next button) is built INSIDE #fx by effects.js (playStageClear). #next-wrap is
         kept as an INVISIBLE state marker (SSOT selector QA/solver toggle `.show` on)
         so harnesses can detect "the Well Done layer is up" without a visible card. The
         #next-btn lives here at rest and is MOUNTED into the Well Done layer (after the
         text reveal) by effects.js, then detached back on teardown. Advancement is
         BUTTON-ONLY (NEXT runs gotoStage — no auto-advance). The old popup card (panel/
         burst/STAGE-CLEAR title/3-star rating) was removed per the redesign. -->
    <div id="next-wrap"><button id="next-btn">Next Stage</button></div>
  </div>

<script type="module">
import { validateLevel } from './engine/schema.js?v=20260624123400';
import { makeRng } from './engine/rng.js?v=20260624123400';
import { Game } from './engine/game.js?v=20260624123400';
import { Renderer, gemFileFor } from './engine/renderer.js?v=20260624123400';
import { EffectsDirector } from './engine/effects.js?v=20260624123400';
import { DragInput } from './engine/input.js?v=20260624123400';
import { TutorialController } from './engine/tutorial.js?v=20260624123400';
import { feedTray, setMaxClear } from './engine/feeder.js?v=20260624123400';
import { Board } from './engine/board.js?v=20260624123400';
import { DEFAULT_CONFIG, mergeConfig } from './engine/config.js?v=20260624123400';
import { getAudio } from './engine/audio.js?v=20260624123400';
// GAMEREELS feature layer (additive; NO-OP on the default path — GR.active is false
// unless ?gamereels / window.__GAMEREELS). GR = host postMessage bridge, haptic() =
// unified buzz (host signal + web fallback), RT = runtime config (from/to/loop/dev,
// read from the URL once). See engine/hostbridge.js + DEPLOY-CONFIG.md.
import { GR, haptic, RT } from './engine/hostbridge.js?v=20260624123400';

// ── AUDIO (JOB 1, GLOBAL L22): a Web Audio manager that decodes the MP3 SFX/BGM
// off the critical path, plays SFX through a pooled+throttled shared context, loops
// the BGM at a lower gain, and unlocks on the FIRST gesture (iOS Safari). It's a
// pure SOUND layer wired to the SAME game/FX events the effects director uses
// (subscribed below in loadLevel), mirroring the 3-layer split. The mute toggle is
// persisted in localStorage and driven by the HUD button. getAudio() also kicks off
// preload() + installs the first-gesture unlock handler.
const audio = getAudio();

const DEBUG = location.search.includes('debug=1') || window.__BB_DEBUG === true;

const el = (id) => document.getElementById(id);
const stage = el('stage'), boardCanvas = el('board'), fx = el('fx');
const tutEl = el('tut'), tutBanner = el('tut-banner'), tutFinger = el('tut-finger');
const nextWrap = el('next-wrap'), nextBtn = el('next-btn');
const traySlots = [...document.querySelectorAll('.tray-slot')].map((slotEl) => ({
  el: slotEl, canvas: slotEl.querySelector('canvas'),
}));

// adventure progression: ordered stage list — 100 stages (stage001=onboarding tutorial,
// stage002..stage100 = the generated adventure, GAME_DESIGN §12). Data-only list of
// level files; the engine just loads them in order (GLOBAL A1). Progression is
// Next-button-only (no auto-advance / skip — see onStageClear + nextBtn).
const STAGES = Array.from({ length: 100 }, (_, k) => `./levels/stage${String(k + 1).padStart(3, '0')}.json`);
let stageIndex = 0;
// HOST-DELEGATED PROGRESS (USER REQ 2026-06-23): the game does NOT persist progress in
// localStorage — the webview HOST (app) is the source of truth. We EMIT progress to the
// host (GameState) and RESTORE from it on relaunch. clearedStages = high-water cleared
// level; currentStage = the 1-based stage to play next. currency/items are GENERIC
// pass-through maps (this game has none → {}) round-tripped verbatim so one host code
// path stores ANY game's progress. See engine/hostbridge.js + bridgeState() below.
let clearedStages = 0;          // highest stage number cleared (1-based; 0 = none yet)
let currency = {};              // generic wallet map (e.g. {coins:N}); {} for this game
let items = {};                 // generic inventory map (e.g. {bomb:N}); {} for this game

let game, renderer, effects, input, tutorial, currentLevel, currentSeed;

// ── layout: size the board canvas to fit the available square area ───────────
function layout() {
  const wrap = el('board-wrap');
  // the goal HUD now lives INSIDE board-wrap (stacked above the grid) — reserve its height
  // + the column gap so the square board still fits without overlapping it.
  const hud = el('hud-top');
  const reserve = (hud && hud.parentElement === wrap ? hud.offsetHeight + 6 : 0);
  const avail = Math.min(wrap.clientWidth, wrap.clientHeight - reserve) - 8;
  renderer.resize(avail, avail);
  renderer.setDims(game.board.cols, game.board.rows);
  if (effects) effects.setDims(game.board.cols, game.board.rows); // keep the sweep grid in sync (SSOT)
  renderer.draw(game.state());
  for (let i = 0; i < traySlots.length; i++) renderer.drawTrayPiece(traySlots[i].canvas, game.tray[i], game.palette);
}

// map a board cell index → CSS rect inside #stage (for FX popups / centroids).
// Uses the renderer's cell-grid ORIGIN (panel pad) so coords match the drawn wells (L12).
function cellRectOf(cellIndex) {
  const cell = renderer.cellSize(), o = renderer.cellOrigin();
  const x = cellIndex % game.board.cols, y = (cellIndex / game.board.cols) | 0;
  const br = boardCanvas.getBoundingClientRect(), sr = stage.getBoundingClientRect();
  return {
    x: (br.left - sr.left) + o.x + x * cell,
    y: (br.top - sr.top) + o.y + y * cell,
    w: cell, h: cell,
  };
}

// CSS rect spanning a whole cleared LINE (row/col) in #stage, from the SAME cell
// grid the blocks use (L12 SSOT) — so the line glow lies exactly over the cleared
// cells with no drift. A row spans all cols at y; a col spans all rows at x.
function lineRectOf(kind, index) {
  const cell = renderer.cellSize(), o = renderer.cellOrigin();
  const br = boardCanvas.getBoundingClientRect(), sr = stage.getBoundingClientRect();
  const ox = (br.left - sr.left) + o.x, oy = (br.top - sr.top) + o.y;
  if (kind === 'row') return { x: ox, y: oy + index * cell, w: game.board.cols * cell, h: cell };
  return { x: ox + index * cell, y: oy, w: cell, h: game.board.rows * cell }; // col
}

// CSS rect of the WHOLE 8×8 cell grid (the board) in #stage coords, from the SAME
// SSOT geom — used to position the stage-clear Well Done layer OVER the board (badges
// above it, gems/banner centered on it) with no drift (L12).
function boardRectOf() {
  const cell = renderer.cellSize(), o = renderer.cellOrigin();
  const br = boardCanvas.getBoundingClientRect(), sr = stage.getBoundingClientRect();
  return {
    x: (br.left - sr.left) + o.x, y: (br.top - sr.top) + o.y,
    w: game.board.cols * cell, h: game.board.rows * cell,
  };
}

// ── tutorial geometry helpers: everything in #stage CSS coords ────────────────
// top-left of board cell (x,y) relative to #stage (for the finger drop target).
function cellTopLeftInStage(x, y) {
  const cell = renderer.cellSize(), o = renderer.cellOrigin();
  const br = boardCanvas.getBoundingClientRect(), sr = stage.getBoundingClientRect();
  return { x: (br.left - sr.left) + o.x + x * cell, y: (br.top - sr.top) + o.y + y * cell };
}
// center of tray slot i relative to #stage (for the finger start point).
function traySlotCenterInStage(i) {
  const r = traySlots[i].el.getBoundingClientRect(), sr = stage.getBoundingClientRect();
  return { x: (r.left - sr.left) + r.width / 2, y: (r.top - sr.top) + r.height / 2 };
}

// ── collect counter: DISPLAYED vs LOGICAL (decoupled) ────────────────────────
// The top gem chip shows a DISPLAYED remaining that LAGS the logical remaining
// while collected gems fly up; it ticks down only on arrival (onGemArrive). The
// logical mission count (game.state().mission) stays the source of truth for
// winning. We reconcile displayed→logical after the flight (and on load / clear)
// so the chip can never double-count or get stuck if an arrival is missed.
let _displayedRemaining = Object.create(null); // gemId -> remaining shown on the chip

// ── DEFERRED displayed SCORE (score/combo missions) — mirrors _displayedRemaining ──
// The top score TRACK (marker + fill) shows a DISPLAYED score that LAGS the logical
// game score: each +N gain pops at the board then FLIES into the bar, and only ON
// ARRIVAL (onScoreArrive) does _displayedScore tick up. So the marker rises as points
// "arrive", not the instant they're scored. Win-sync snaps it to logical right before
// the result dim (onStageClear) so the bar is full when the celebration appears. The
// LOGICAL score (game.state().score) stays the source of truth for winning.
let _displayedScore = 0;

// ── ㊼ IMMEDIATE goal ✓ (user req 2026-06-19): the moment the DISPLAYED score/gem count
// reaches its target, stamp a ✓ on that HUD element RIGHT THEN — not a beat later at the
// goal-confirm. These persist (cleared on stage load) so the ✓ stays through the celebration.
let _goalChecks = [];
let _checkedGoals = new Set();
function popGoalCheck(host, leftPct, topPx, size) {
  if (!host) return;
  if (getComputedStyle(host).position === 'static') host.style.position = 'relative';
  const chk = document.createElement('div'); chk.className = 'goal-check'; chk.textContent = '✓';
  chk.style.left = leftPct; chk.style.top = topPx; if (size) chk.style.fontSize = size + 'px';
  host.appendChild(chk); _goalChecks.push(chk);
}
function clearGoalChecks() { _goalChecks.forEach((c) => c.remove()); _goalChecks = []; _checkedGoals = new Set(); }
// pop a ✓ for any goal whose DISPLAYED value has just met its target (idempotent via _checkedGoals).
function checkGoalMarks() {
  if (!game) return;
  const pr = game.state().mission, mission = el('mission');
  if (!pr || !mission) return;
  if (pr.type === 'collect' || pr.type === 'combo') {
    const targets = pr.targets || (pr.type === 'collect' ? [{ gem: pr.item, got: pr.got, need: pr.need }] : []);
    for (const t of targets) {
      const rem = (t.gem in _displayedRemaining) ? _displayedRemaining[t.gem] : Math.max(0, t.need - t.got);
      if (rem <= 0 && !_checkedGoals.has('gem:' + t.gem)) {
        _checkedGoals.add('gem:' + t.gem);
        for (const chip of mission.querySelectorAll('.gem-chip')) {
          const img = chip.querySelector('img');
          if (img && img.getAttribute('src') === gemFileFor(t.gem)) {
            chip.classList.add('done');
            popGoalCheck(chip, '50%', img ? (img.offsetTop + img.offsetHeight / 2) + 'px' : '40%', 22);
          }
        }
      }
    }
  }
  const scoreNeed = pr.type === 'score' ? pr.need : (pr.score ? pr.score.need : null);
  if (scoreNeed != null && _displayedScore >= scoreNeed && !_checkedGoals.has('score')) {
    _checkedGoals.add('score');
    const track = mission.querySelector('.score-track');
    popGoalCheck(track && (track.querySelector('.marker') || track.querySelector('.target')), '50%', '50%', 26);
  }
}

// pull each gem's logical remaining = need - got (clamped ≥ 0).
function logicalRemaining() {
  const pr = game.state().mission;
  const out = Object.create(null);
  // collect AND combo both carry gem `targets[]` (combo also has a score sub-goal which
  // is NOT a flying gem; only the gem chips fly). Anything else has no flying gems.
  if (pr.type !== 'collect' && pr.type !== 'combo') return out;
  const targets = pr.targets || (pr.type === 'collect' ? [{ gem: pr.item, got: pr.got, need: pr.need }] : []);
  for (const t of targets) out[t.gem] = Math.max(0, t.need - t.got);
  return out;
}

// snap the DISPLAYED counters to the current logical values (load / new shape).
function resetDisplayedFromLogical() {
  _displayedRemaining = logicalRemaining();
  const t = game.state().mission.type;
  if (t === 'collect' || t === 'combo') updateHUD();
}

// reconcile DISPLAYED → LOGICAL (never below logical; clamp stuck/missed arrivals).
// Called a beat after a clear so any gem whose flight was skipped still settles, and
// on stage clear so the final readout is exactly the logical remaining.
function reconcileDisplayed() {
  const t = game.state().mission.type;
  // SCORE catch-up (score/combo): a CLEARING placement adds the placed-cell points to the
  // logical score but emits onLineClear (not onPlace), so only the clearScore flies — the
  // few placement points would stay un-animated. Snap displayed → logical a beat after the
  // flight so the marker settles EXACTLY (never stuck below logical), mirroring the gems.
  if (t === 'score' || t === 'combo') {
    const log = game.state().score;
    if (_displayedScore !== log) { _displayedScore = Math.min(log, Math.max(_displayedScore, log)); updateHUD(); }
  }
  if (t !== 'collect' && t !== 'combo') return;
  const log = logicalRemaining();
  let changed = false;
  for (const gem in log) {
    if (_displayedRemaining[gem] !== log[gem]) { _displayedRemaining[gem] = log[gem]; changed = true; }
  }
  if (changed) updateHUD();
}

// counterPosOf(gem): center of that gem's HUD chip icon, in #stage CSS coords. Falls
// back to the #mission area center if the chip isn't found (e.g. a single-icon HUD).
function counterPosOf(gem) {
  const sr = stage.getBoundingClientRect();
  const mission = el('mission');
  const chips = mission.querySelectorAll('.gem-chip');
  for (const chip of chips) {
    const img = chip.querySelector('img');
    if (img && img.getAttribute('src') && img.getAttribute('src') === gemFileFor(gem)) {
      const r = img.getBoundingClientRect();
      return { x: (r.left - sr.left) + r.width / 2, y: (r.top - sr.top) + r.height / 2 };
    }
  }
  const mr = mission.getBoundingClientRect();
  return { x: (mr.left - sr.left) + mr.width / 2, y: (mr.top - sr.top) + mr.height / 2 };
}

// onGemArrive(gem): a flying gem reached the counter → tick the DISPLAYED remaining
// down by 1 (never below the logical remaining, so we can't overshoot) + pop the chip.
function onGemArrive(gem) {
  // each gem dings as it lands on the counter (the per-gem juice; throttled in the
  // audio manager so a multi-gem cascade reads as a sequence, not a buzzsaw — L13).
  audio.play('gem');
  const log = logicalRemaining();
  const floor = (gem in log) ? log[gem] : 0;
  const cur = (gem in _displayedRemaining) ? _displayedRemaining[gem] : floor + 1;
  _displayedRemaining[gem] = Math.max(floor, cur - 1);
  updateHUD();
  // tiny pop on the arriving chip
  const mission = el('mission');
  for (const chip of mission.querySelectorAll('.gem-chip')) {
    const img = chip.querySelector('img');
    if (img && img.getAttribute('src') === gemFileFor(gem)) {
      chip.classList.remove('arrive'); void chip.offsetWidth; chip.classList.add('arrive');
    }
  }
  checkGoalMarks();   // ㊼ ✓ the INSTANT this gem's displayed count hits 0
}

// onScoreArrive(amount): a flying "+N" score-gain popup reached the top score bar →
// tick the DISPLAYED score up by that amount, CLAMPED to the logical score so it can
// never overshoot (multiple flies in transit + the win-snap stay consistent). Updates
// the HUD so the marker/number rise IN SYNC with the landing. The bar pulses on arrival.
function onScoreArrive(amount) {
  const logical = game.state().score;
  _displayedScore = Math.min(logical, _displayedScore + amount);
  updateHUD();
  // tiny pulse on the marker as the points land (matches the gem-chip arrive pop).
  const marker = el('mission').querySelector('.score-track .marker');
  if (marker) { marker.classList.remove('arrive'); void marker.offsetWidth; marker.classList.add('arrive'); }
  checkGoalMarks();   // ㊼ ✓ the INSTANT the displayed score reaches the target
}

// scoreBarPosOf(): CENTER of the top score-bar MARKER (the moving circle) in #stage CSS
// coords — the target the flying "+N" popup is sucked into. Mirrors counterPosOf/
// cellRectOf (getBoundingClientRect minus the #stage rect). Returns null when there's no
// score marker (non-score/combo HUD) — the fly then falls back to drifting up + fading
// but STILL ticks the displayed score (so it never gets stuck below logical).
function scoreBarPosOf() {
  const marker = el('mission').querySelector('.score-track .marker');
  if (!marker) return null;
  const sr = stage.getBoundingClientRect();
  const r = marker.getBoundingClientRect();
  return { x: (r.left - sr.left) + r.width / 2, y: (r.top - sr.top) + r.height / 2 };
}

// ── HUD ───────────────────────────────────────────────────────────────────
// Build the mission readout (collect = gem chips, score = score/target, other =
// badge). Rebuilt only when the SHAPE changes (which gems / mission type) so we
// don't re-create DOM every frame (L13); counts update in place.
let _missionShape = null;
// Set each gem-chip's sprite via the .src PROPERTY (NOT innerHTML). The reels build inlines
// every asset and resolves `assets/…` → data URI via a shim on HTMLImageElement.prototype.src
// / setAttribute. innerHTML sets src through the HTML PARSER, which BYPASSES that shim → the
// gem icon loads as a BROKEN "?" image in the webview host. So we build the chip markup with
// an EMPTY <img> then assign its src here. (Same root cause as the combo-label "?" box.)
function applyGemChipSrcs(targets) {
  el('mission').querySelectorAll('.gem-chip img').forEach((img, i) => {
    if (targets[i]) img.src = gemFileFor(targets[i].gem);
  });
}
function buildMission(pr) {
  const mission = el('mission');
  if (pr.type === 'collect') {
    const targets = pr.targets || [{ gem: pr.item, got: pr.got, need: pr.need }];
    const shape = 'collect:' + targets.map((t) => t.gem).join(',');
    if (shape === _missionShape) return;
    _missionShape = shape;
    // new shape → seed the DISPLAYED counters from the logical remaining (so a chip
    // never shows a stale value from a prior stage). The chip text reads displayed.
    for (const t of targets) if (!(t.gem in _displayedRemaining)) _displayedRemaining[t.gem] = Math.max(0, t.need - t.got);
    mission.innerHTML = targets.map((t, i) =>
      `<span class="gem-chip" data-i="${i}"><img alt="" draggable="false"><span class="count">${_displayedRemaining[t.gem]}</span></span>`
    ).join('');
    applyGemChipSrcs(targets);   // set img.src via property → reels asset shim resolves it
  } else if (pr.type === 'score') {
    // include the target in the shape key so switching to a score level with a
    // DIFFERENT target rebuilds the readout (the target circle is baked at build time).
    if (_missionShape !== 'score:' + pr.need) {
      _missionShape = 'score:' + pr.need;
      // moving-circle score track (CHANGE 3): filled portion + current-score marker
      // that slides toward the darker target circle at the right end.
      mission.innerHTML = `<span class="score-mission"><span class="score-track">`
        + `<span class="fill"></span>`
        + `<span class="marker">0</span>`
        + `<span class="target">${pr.need}</span>`
        + `</span></span>`;
    }
  } else if (pr.type === 'combo') {
    // combo (GAME_DESIGN §12.2): show the score track AND the gem chip(s) at once.
    const targets = pr.targets || [];
    const scoreNeed = pr.score ? pr.score.need : 0;
    const shape = 'combo:' + scoreNeed + ':' + targets.map((t) => t.gem).join(',');
    if (shape === _missionShape) return;
    _missionShape = shape;
    for (const t of targets) if (!(t.gem in _displayedRemaining)) _displayedRemaining[t.gem] = Math.max(0, t.need - t.got);
    let html = '';
    if (pr.score) {
      html += `<span class="score-mission"><span class="score-track">`
        + `<span class="fill"></span><span class="marker">0</span>`
        + `<span class="target">${pr.score.need}</span></span></span>`;
    }
    html += targets.map((t, i) =>
      `<span class="gem-chip" data-i="${i}"><img alt="" draggable="false"><span class="count">${_displayedRemaining[t.gem]}</span></span>`
    ).join('');
    mission.innerHTML = html;
    applyGemChipSrcs(targets);   // set img.src via property → reels asset shim resolves it
  } else {
    if (_missionShape !== 'badge:' + pr.type) {
      _missionShape = 'badge:' + pr.type;
      mission.innerHTML = `<span class="icon badge">${pr.type[0].toUpperCase()}</span><span class="count">${pr.got} / ${pr.need}</span>`;
    }
  }
}
// Position the moving score marker + the gold fill so the marker NEVER collides with the
// target circle at the right end until completion (frac=1). The marker rides the leading
// edge of the fill, so the current-score number and the filled background always line up.
// Travel range: marker CENTER from its own radius (left edge flush with the track) to a
// point that clears the target circle (target half-width + marker half-width + a small gap).
function setScoreTrack(mission, frac, scoreText) {
  const track = mission.querySelector('.score-track');
  const marker = mission.querySelector('.marker');
  const fill = mission.querySelector('.fill');
  if (!track || !marker || !fill) return;
  const trackW = track.clientWidth || 150;
  const startPx = 15;                 // marker radius (34px embossed circle) → at frac 0 its left edge sits ~flush
  const endPx = Math.max(startPx, trackW - 40); // clears the 34px engraved goal socket during play (small gap)
  marker.textContent = scoreText;
  if (frac >= 1) {
    // GOAL REACHED: the moving circle slides ALL THE WAY to the RIGHT END to MEET the
    // target circle (a clear "you hit the goal!" arrival), and the gold fill completes the
    // whole bar. Overlapping the target is fine HERE (it's the win climax) — we only keep
    // the marker clear of the target DURING play (frac<1) to avoid the mid-game collision.
    // CONCENTRIC with the target circle: both are 34px, and the target sits at right:-13px
    // (so its center is trackW - 4). Putting the marker center there makes the two SAME-SIZE
    // circles overlap EXACTLY (center-aligned) at the right end — user req. Not past it.
    marker.style.left = (trackW - 4) + 'px';       // seats EXACTLY in the engraved goal socket (concentric)
    fill.style.width = (trackW - 8) + 'px';          // fill completes the groove up to the socket
  } else {
    const px = startPx + frac * (endPx - startPx);
    marker.style.left = px + 'px';
    fill.style.width = Math.max(0, px - 3) + 'px'; // fill (inset left:3px) ends under the marker
  }
}
function updateHUD() {
  const s = game.state();
  el('score').textContent = s.score;
  el('combo').textContent = s.combo >= 2 ? `Combo ×${s.combo}` : '';
  const pr = s.mission;
  buildMission(pr);
  const mission = el('mission');
  if (pr.type === 'collect') {
    const targets = pr.targets || [{ gem: pr.item, got: pr.got, need: pr.need }];
    const chips = mission.querySelectorAll('.gem-chip');
    targets.forEach((t, i) => {
      const chip = chips[i]; if (!chip) return;
      // DISPLAYED remaining drives the chip (lags logical during the gem flight); the
      // progress bar below follows logical. Displayed never drops below logical, and
      // reconcileDisplayed() snaps it exact after the flight / on clear (no stuck/dup).
      const log = Math.max(0, t.need - t.got);
      if (!(t.gem in _displayedRemaining)) _displayedRemaining[t.gem] = log;
      const remain = Math.max(log, _displayedRemaining[t.gem]);
      chip.querySelector('.count').textContent = remain;
      chip.classList.toggle('done', remain === 0);
    });
  } else if (pr.type === 'score') {
    // move the marker to DISPLAYED/target along the track; grow the fill to match. The
    // DISPLAYED score LAGS the logical score and ticks up as each "+N" fly LANDS
    // (onScoreArrive) — so the marker rises as the points arrive, not instantly. Win
    // detection stays on the logical state; only this readout is deferred.
    const frac = Math.max(0, Math.min(1, pr.need ? _displayedScore / pr.need : 0));
    setScoreTrack(mission, frac, _displayedScore);
  } else if (pr.type === 'combo') {
    // combo (GAME_DESIGN §12.2): drive BOTH the score track (if any) AND the gem chips.
    if (pr.score) {
      const frac = Math.max(0, Math.min(1, pr.score.need ? _displayedScore / pr.score.need : 0));
      setScoreTrack(mission, frac, _displayedScore);
    }
    const targets = pr.targets || [];
    const chips = mission.querySelectorAll('.gem-chip');
    targets.forEach((t, i) => {
      const chip = chips[i]; if (!chip) return;
      const log = Math.max(0, t.need - t.got);
      if (!(t.gem in _displayedRemaining)) _displayedRemaining[t.gem] = log;
      const remain = Math.max(log, _displayedRemaining[t.gem]);
      chip.querySelector('.count').textContent = remain;
      chip.classList.toggle('done', remain === 0);
    });
  } else {
    const c = mission.querySelector('.count'); if (c) c.textContent = `${pr.got} / ${pr.need}`;
  }
  // (removed the redundant bottom progress bar above the tray — user req 2026-06-18: the TOP
  // HUD already shows mission progress (gem chips / score track), so the bottom bar was noise.)
}

// ── tray rendering after a change ────────────────────────────────────────────
// FIX C — refill-reveal delay: when a placement consumes the LAST tray piece the
// LOGICAL tray refills synchronously (game.tray already holds the new pieces), but
// we hold the new pieces' VISUAL appearance for one clear-anim beat so the player
// first sees the last block land + its line clear, THEN the fresh queue pops in.
// While `refillPending` is true we draw the slots EMPTY (no new pieces) and gate
// dragging (input.setTraySuppressed). The flag + timeout are cancelled on every
// level load / restart so a fresh stage never inherits a stale pending reveal.
let refillPending = false;
let _refillTimer = null;

function refreshTray() {
  // ⑩ game over: the queue is CLEARED ("No Space Left" shows instead) — draw every slot empty
  // and keep it hidden, so a refreshTray after the game-over placement never restores pieces.
  if (game && game.over) {
    for (const s of traySlots) { renderer.drawTrayPiece(s.canvas, null, game.palette); s.el.classList.add('tray-hidden'); }
    return;
  }
  for (let i = 0; i < traySlots.length; i++) {
    // during the reveal delay, render the freshly-refilled slots as EMPTY (null) so
    // the new pieces stay hidden until the beat elapses (logical tray is untouched).
    const piece = refillPending ? null : game.tray[i];
    renderer.drawTrayPiece(traySlots[i].canvas, piece, game.palette);
    traySlots[i].el.classList.remove('lifted');
    // pop/fade the new queue in when it reveals (CSS .tray-reveal animation)
    traySlots[i].el.classList.toggle('tray-hidden', refillPending);
  }
}

// cancel any in-flight refill reveal (level load / restart) → show the live tray.
function cancelRefillReveal() {
  if (_refillTimer) { clearTimeout(_refillTimer); _refillTimer = null; }
  refillPending = false;
  if (input) input.setTraySuppressed(false);
}

// begin the host-only reveal delay after a refilling placement. The board + FX have
// already been rendered (the last block + its line clear are visible); we just hold
// the NEW tray pieces hidden + un-grabbable for one clear-anim beat, then reveal.
function startRefillReveal() {
  refillPending = true;
  if (input) input.setTraySuppressed(true);
  refreshTray(); // hide the new pieces NOW (they must not flash in this frame)
  if (_refillTimer) clearTimeout(_refillTimer);
  const delay = (game.cfg.effects.trayRefillRevealMs ?? 420);
  _refillTimer = setTimeout(() => {
    _refillTimer = null;
    refillPending = false;
    if (input) input.setTraySuppressed(false);
    refreshTray(); // now draw + reveal the new queue (and re-enable dragging)
  }, delay);
}

function onChange() { renderer.draw(game.state()); updateHUD(); refreshTray(); }

// ── load a level (json) with a seed ──────────────────────────────────────────
async function loadLevel(levelJson, seed) {
  const { ok, errors, level } = validateLevel(levelJson);
  if (!ok) { console.error('Invalid level:', errors); throw new Error('invalid level: ' + errors.join('; ')); }
  // FIX C — a fresh stage / restart must never inherit a pending refill-reveal from
  // the previous game (would hide the new stage's first tray). Cancel it up front.
  cancelRefillReveal();
  // also cancel any pending post-clear stage-clear-sequence timer so a load (incl. direct
  // __BB.load / restart) never lets a stale dim drop OVER the freshly-loaded stage.
  clearTimeout(window.__bbSeqTimer); window.__bbSeqTimer = 0;
  // cancel a pending score reconcile from the previous stage (a fresh stage resets the
  // displayed score to 0 below; a stale reconcile would be harmless but we keep it clean).
  clearTimeout(window.__bbScoreReconcile); window.__bbScoreReconcile = 0;
  // reset the last-clear fx tracker (task D) so a stale 2+ clear from the previous stage
  // can never extend the next stage's result delay before that stage scores its own clear.
  window.__bbLastClear = { lines: 0, fxMs: 0 };
  // ⑩: clear any prior game-over "No Space Left" overlay + un-hide the tray for the fresh stage.
  { const ns = document.getElementById('no-space'); if (ns) ns.remove();
    document.querySelectorAll('.tray-slot.tray-hidden').forEach((s) => s.classList.remove('tray-hidden')); }
  currentLevel = level;
  currentSeed = (seed == null) ? (level.feeder?.seed || Date.now() % 2147483647) : seed;
  const rng = makeRng(currentSeed);
  game = new Game(level, rng);

  if (!renderer) {
    renderer = new Renderer(boardCanvas);
    // FLAT-TRAY FIX: the board redraws itself when the block sprites finish decoding
    // (renderer.js), but the TRAY canvases are host-owned and weren't refreshed — so on
    // the very first stage (sprites not yet decoded at first paint) the queue blocks fell
    // back to flat solid colors and never updated. Redraw the tray once sprites are ready.
    renderer.imgs.ready.then(() => { try { refreshTray(); } catch (e) {} });
  }
  document.body.classList.remove('sc-dim');   // a fresh stage starts bright (drop any prior result-screen viewport dim)
  if (!effects) effects = new EffectsDirector(fx, renderer, game.cfg.effects,
    { cellRectOf, lineRectOf, counterPosOf, onGemArrive, scoreBarPosOf, onScoreArrive });
  else effects.clearBanner();
  effects.attach(game);
  // DEV/QA handles: read-only references for the dev stage-selector + headless QA (e.g. force
  // a 따봉 reward via game.emit('onGoodPlace', {cells:[...], color:'b'}) for a screenshot).
  window.game = game; window.effects = effects;

  // AUDIO event wiring (JOB 1, L22): play SFX ALONGSIDE the effects director on the
  // same game events. Tier-gated where needed so a sound doesn't spam every clear:
  //   onPlace      → place ding (only fires on a NON-clearing drop; see game.js)
  //   onLineClear  → clear whoosh + a gem ding PER collected gem (each gem dings on
  //                  ARRIVAL via onGemArrive below — that's the satisfying per-gem
  //                  feedback; the clear sound fires once here for the line itself)
  //   onCombo      → combo riff (game emits this only when combo ≥ 2)
  //   onPraise     → praise sting, but ONLY tier ≥ 3 (fantastic+) so it doesn't play
  //                  on every single-line clear (tier-gate, anti-spam per spec)
  //   onStageClear → the stage-clear fanfare is NOT wired here; it fires ONCE inside the
  //                  Well Done sequence (onStageClear → effects.playStageClear onSfx) so
  //                  it plays at the right beat and is never doubled.
  // Button taps (Next / restart) play the button sound at their handlers.
  game.on('onPlace', () => audio.play('place'));
  // A placement that CLEARS a line emits onLineClear (NOT onPlace). Play ONLY the clear sound — the
  // earlier version ALSO played 'place' here, so a clearing drop fired TWO sounds (place + clear),
  // which read as a doubled/"번갈아" sound now that Web Audio plays both reliably (USER REQ 2026-06-22).
  game.on('onLineClear', () => audio.play('clear'));
  game.on('onCombo', () => audio.play('combo'));
  game.on('onPraise', (e) => { if ((e.tier || 0) >= 3) audio.play('praise'); });
  // ⑩ game over: clear the queue + show "No Space Left" in the tray area (the board fill
  // animation + the Game Over banner are driven by the effects layer's _gameOver).
  game.on('onGameOver', () => {
    // remove the queue blocks outright (clear each slot canvas + hide), then show "No Space Left".
    traySlots.forEach((s) => { renderer.drawTrayPiece(s.canvas, null, game.palette); s.el.classList.add('tray-hidden'); });
    if (!document.getElementById('no-space')) {
      const ns = document.createElement('div'); ns.id = 'no-space'; ns.textContent = 'No Space Left';
      el('tray').appendChild(ns);
    }
    // GAMEREELS: signal failure to the host (no-op when GR inactive). progressIndex/
    // currentIndex = the 1-based level the player failed on (stageIndex+1).
    if (GR.active) GR.gameEnd(false, stageIndex + 1);
    // HOST-DELEGATED PROGRESS: game over is a save point. currentStage = the failed stage
    // (player retries it on relaunch); clearedStages high-water is unchanged.
    bridgeSaveState();
  });

  // reset the DISPLAYED collect counters to this level's logical remaining (a fresh
  // stage must never inherit the previous stage's displayed lag — reconcile on load).
  resetDisplayedFromLogical();
  // reset the DEFERRED displayed SCORE to 0 for the new stage (a fresh score/combo
  // mission starts the marker at 0; it then ticks up as +N flies land). Must be reset
  // BEFORE the first updateHUD so the bar never inherits the previous stage's value.
  _displayedScore = 0;
  clearGoalChecks();   // ㊼ drop any ✓ stamps so a fresh stage never inherits them
  // gate the tiered score-gain → bar fly to score/combo stages (collect keeps the gold
  // "+score" popup). Driven off this stage's mission type (the single source of truth).
  {
    const mt = game.state().mission.type;
    effects.setScoreMode(mt === 'score' || mt === 'combo');
  }

  // clear the stage-clear state marker from a previous stage. The actual sequence
  // (sweep cells / Well Done layer / confetti / timers + the detached #next-btn) is
  // torn down by effects.clearBanner() above (effects.tearDownStageClear) so nothing
  // lingers into the new stage.
  nextWrap.classList.remove('show');

  // tear down a previous tutorial controller (if any)
  if (tutorial) { tutorial.destroy(); tutorial = null; }

  // adventure clear → show the "Next" affordance (or restart for game over).
  // For the tutorial the effects director suppresses its banner (overlay shown
  // by the tutorial), so onStageClear here drives progression.
  game.on('onStageClear', () => { reconcileDisplayed(); onStageClear(); });

  // after each clear, schedule a DISPLAYED→LOGICAL reconcile a beat past the gem
  // flight so any missed arrival settles exactly (never stuck / double-counted).
  const flyMs = (game.cfg.effects.gemFlyMs || 520);
  const flyStagger = (game.cfg.effects.gemFlyStaggerMs || 70);
  game.on('onLineClear', (e) => {
    // TASK D — remember the LAST clear's line count + its fx duration so onStageClear can
    // make the result dim WAIT for a 2+ line rainbow wave-burst to FULLY play before the
    // sweep/dim masks it. effects._lastClearFxMs is set synchronously inside _lineClear
    // (which runs on this same event, registered earlier in attach), so it's current here.
    window.__bbLastClear = { lines: e.lines || 0, fxMs: (effects && effects._lastClearFxMs) || 0,
      cells: e.cells || [], origin: e.origin || null, colors: e.cellColors || {} }; // ㊻ data for the win choreography
    // SCORE/COMBO: schedule a displayed→logical SCORE reconcile a beat past the score-fly
    // (hold ~360 + flight ~460 worst case) so any un-animated placement points on this
    // clearing move (onPlace doesn't fire when lines clear) settle onto the marker.
    const mt = game.state().mission.type;
    if (mt === 'score' || mt === 'combo') {
      clearTimeout(window.__bbScoreReconcile);
      window.__bbScoreReconcile = setTimeout(reconcileDisplayed, 900);
    }
    const n = (e.gems && e.gems.length) || 0;
    if (n === 0) return;
    clearTimeout(window.__bbGemReconcile);
    window.__bbGemReconcile = setTimeout(reconcileDisplayed, flyMs + (n - 1) * flyStagger + 200);
  });

  // (re)create input bound to the new game. `effects` drives the line-clear PREVIEW
  // glow during a drag (CHANGE 1); it's created once above and reused across loads.
  // onPlaced fires after EVERY successful drop. When the drop consumed the last tray
  // piece (res.refilled), kick off the host-only refill-reveal delay (FIX C): the
  // board + clear FX show first, then the new queue pops in a beat later.
  const handlePlaced = (res) => { if (res && res.refilled) startRefillReveal(); };
  if (!input) {
    input = new DragInput({ stage, boardCanvas, traySlots, renderer, game,
      onPlaced: handlePlaced, onChange, effects });
  } else { input.setGame(game); input.setEffects(effects); input.setOnPlaced(handlePlaced); }
  if (DEBUG) { window.__input = input; window.__renderer = renderer; }   // QA: inspect drag/render state

  // onboarding tutorial controller (only when the level enables it, §10)
  if (game.tutorial) {
    tutorial = new TutorialController({
      game, level,
      overlay: tutEl, bannerEl: tutBanner, fingerEl: tutFinger,
      traySlots,
      cellSize: () => renderer.cellSize(),
      cellTopLeft: cellTopLeftInStage,
      traySlotCenter: traySlotCenterInStage,
    });
    input.setTutorial(tutorial);
  } else {
    tutEl.style.display = 'none';
    input.setTutorial(null);
  }

  // restart on banner tap (game-over path; tutorial is failure-proof)
  fx.onclick = () => { if (game.over) { audio.play('button'); effects.clearBanner(); loadLevel(currentLevel, currentSeed); } };

  layout();
  updateHUD();

  // start the tutorial AFTER layout so geometry helpers have real rects
  if (tutorial) tutorial.start();
}

// load a stage's level JSON by ordered index. Bundled/offline builds (gamereels in a
// file:// or sandboxed webview that blocks fetch) inline ALL levels into
// window.__LEVELS = { stage001:{…}, … } via a classic <script> loaded before app.js,
// so we read from there first (zero-fetch). The normal/live build has no __LEVELS →
// it falls back to fetch(STAGES[i]) exactly as before (no behavior change). (L22)
async function loadStageData(i) {
  const id = 'stage' + String(i + 1).padStart(3, '0');
  const L = (typeof window !== 'undefined') ? window.__LEVELS : null;
  if (L && L[id]) {
    const v = L[id];
    // tolerate either an inlined object or a JSON string per stage.
    return (typeof v === 'string') ? JSON.parse(v) : v;
  }
  const res = await fetch(STAGES[i]);
  return await res.json();
}

// load a stage by ordered index (adventure progression). Clamps to the list.
async function gotoStage(i) {
  // cancel any pending tutorial auto-advance timer FIRST — otherwise a manual
  // "Next" tap during the onboarding auto-advance window advances once, then the
  // stale timer fires again and advances a SECOND time → stage 2 gets skipped.
  clearTimeout(window.__bbAutoNext); window.__bbAutoNext = 0;
  clearTimeout(window.__bbSeqTimer); window.__bbSeqTimer = 0; // cancel a pending result-screen
  stageIndex = Math.max(0, Math.min(STAGES.length - 1, i));
  const lvl = await loadStageData(stageIndex);
  await loadLevel(lvl, DEBUG ? 12345 : null);
  updateDevStage();   // keep the dev stage selector label/ends in sync
  return stageIndex;
}

// adventure clear handler — plays the STAGE-CLEAR SEQUENCE (redesign 2026-06-18):
//   (1) a row-by-row ALTERNATING-direction neon grid sweep over the board, then
//   (2) a "Well Done" layer (Lv.N badge + RAPID progress bar that flashes at full +
//       Lv.N+1 badge, confetti raining from the top, decorative center gems, the
//       "Well Done!" banner revealed left→right), and finally
//   (3) the "Next Stage" button appears ONLY after the text reveal.
// Advancement is BUTTON-ONLY for EVERY stage incl. onboarding (no auto-advance — user
// req 2026-06-17): the player taps the button to continue (gotoStage). #next-wrap is
// toggled `.show` while the Well Done layer is up (state marker for QA/solver). The
// sequence is driven by effects.playStageClear and torn down by clearBanner() on load.
// ⑦ GOAL-CONFIRM beat (user req 2026-06-18) — a clean "goal met!" emphasis on the goal HUD
// (the score track for score missions, the gem chips for collect/combo) shown AFTER the goal
// juice and BEFORE the stage-clear grid sweep, so the clear is unmistakable. Pops + glows
// #mission, flashes the gem chips "done", stamps a ✓ over the HUD. Returns the beat duration
// (ms) so onStageClear waits for it; self-removes everything afterward.
function playGoalConfirm(type) {
  const hud = el('hud-top'), mission = el('mission');
  if (!hud || !mission) return 0;
  mission.classList.remove('goal-confirm'); void mission.offsetWidth; // restart cleanly
  mission.classList.add('goal-confirm');
  const DUR = 820;
  // ㊼: the ✓ now pops the INSTANT a goal is MET (checkGoalMarks, fired from onGem/ScoreArrive),
  // not here. This beat only does the chip "done" emphasis + a FALLBACK ✓ for any goal that was
  // met without a flight arrival (so the ✓ is never missed).
  checkGoalMarks();
  if (type === 'collect' || type === 'combo') {
    mission.querySelectorAll('.gem-chip').forEach((c) => {
      const cnt = c.querySelector('.count'); if (cnt) cnt.textContent = '0';
      c.classList.add('done', 'confirm');
    });
  }
  setTimeout(() => {
    mission.classList.remove('goal-confirm');
    mission.querySelectorAll('.gem-chip.confirm').forEach((c) => c.classList.remove('confirm'));
  }, DUR + 60);
  return DUR;
}

function onStageClear() {
  // GAMEREELS run-cap: a limited run (RT.to < 100) ENDS at level RT.to — the player
  // does not advance past it. Default to=100 → `last` is unchanged (true only at the
  // real end of the adventure). When the capped level is cleared, the Next button
  // finishes the run (see nextBtn.onclick: it replays from RT.from / GR.gameEnd fired).
  const cappedEnd = stageIndex >= (RT.to - 1);
  const last = (stageIndex >= STAGES.length - 1) || cappedEnd;
  const levelNum = stageIndex + 1;            // current stage number N (1-based)
  // GAMEREELS: emit GameEnd(success) DELAYED ~700ms so it fires AFTER the clear
  // celebration (the host shows its CTA post-anim). CAPTURE levelNum NOW so a later
  // auto-advance can't change the reported level. Gated by RT.shouldEmitGameEnd:
  // limited run → at RT.to; loop set → every `loop`; default → every 30 (30/60/90).
  if (GR.active && RT.shouldEmitGameEnd(levelNum)) {
    setTimeout(() => { try { GR.gameEnd(true, levelNum); } catch (e) {} }, 700);
  }
  // HOST-DELEGATED PROGRESS: stage CLEAR is a save point. Bump the high-water cleared
  // level and persist with currentStage = the NEXT stage (so a relaunch resumes ahead,
  // even if the app is closed on the Well Done overlay before tapping Next).
  clearedStages = Math.max(clearedStages, levelNum);
  bridgeSaveState(levelNum + 1);
  nextBtn.textContent = last ? 'Replay' : 'Next Stage';

  // drop any leftover transient fx, then kick the sequence off ONLY AFTER the GOAL-
  // COMPLETION juice finishes (user: the result dim must not cut off the score-marker
  // slide / gem-collect flights). Score missions wait for the marker to slide to the
  // target (~.22s CSS transition + settle); collect/combo wait for the gems to fly to
  // the counter and the count to reconcile.
  // CAPTURE the winning clear's fx info BEFORE clearBanner() — clearBanner tears the
  // sequence down but does NOT touch __bbLastClear (host var) or _lastClearFxMs (only
  // overwritten on the NEXT onLineClear). We read it here so a 2+ line winning clear can
  // extend showDelay below (task D). The win move's onLineClear fired just before this.
  const winClear = window.__bbLastClear || { lines: 0, fxMs: 0 };
  // KEEP the in-flight clear burst alive for ANY winning clear (㉔: 1-line too, not just 2+)
  // — clearBanner() otherwise wipes the fragment/burst layer, killing the effect before it even
  // PAINTS (the whole place→clear→win is synchronous). Level LOAD still wipes (no-arg call).
  const keepWave = winClear.lines >= 1 && winClear.fxMs > 0;
  if (effects) effects.clearBanner(keepWave);
  // ㊻ WIN CHOREOGRAPHY (USER REQ 2026-06-19): the moment the last piece lands, run the ordered
  // celebration over the board — ①cleared block ZOOMS → ②blocks FALL down + CONFETTI from the
  // top → ③ZIGZAG RAINBOW grid fill — THEN the result screen (showDelay is extended below to
  // outlast it). The gems still fly to the counter during the fall. Replaces the bare ㊹ sweep.
  let winSeqMs = 0;
  if (effects) winSeqMs = effects.playWinSequence({
    boardRect: boardRectOf(), cells: winClear.cells || [], origin: winClear.origin, colors: winClear.colors || {},
  });
  const pr = game.state().mission;
  const fxc = game.cfg.effects || {};
  let showDelay = (pr.type === 'collect' || pr.type === 'combo')
    ? (fxc.gemFlyMs ?? 520) + (fxc.gemFlyStaggerMs ?? 70) * 3 + 360
    : 560; // score: marker slides to the right end (~.22s) + a clear hold before the dim
  // TASK D — if the WINNING move was a 2+ line clear, the RAINBOW WAVE-BURST must FULLY
  // play before the result sweep/dim (otherwise the dim masks it → "no clear effect").
  // EXTEND showDelay to outlast the wave-burst + a small beat (never SHORTEN it, so all
  // the existing win-sequencing — deferred displayed score, marker overlap, score-fly,
  // timer cancellation — stays intact; we only push the dim later).
  if (winClear.lines >= 1 && winClear.fxMs > 0) {
    showDelay = Math.max(showDelay, winClear.fxMs + 180); // the clear burst finishes, then a beat
  }
  // ㊻ the result screen must wait for the whole win choreography (fall→confetti→zigzag) to play.
  showDelay = Math.max(showDelay, winSeqMs);
  // ㊻v3: the goal-confirm beat runs this long BEFORE the result, so it overlaps the rainbow's
  // tail instead of delaying the result after it.
  const GOAL_CONFIRM_LEAD = 420;
  // STORE the timer (window.__bbSeqTimer, which gotoStage/load cancels) so a stage load
  // during this delay CANCELS the pending sequence — otherwise a stale post-clear timer
  // would fire the dim OVER the freshly-loaded next stage (race widened by the longer
  // goal-completion delay above). NOT __bbAutoNext: that name means "auto-advance" (which
  // is intentionally gone — button-only), and QA asserts it stays unarmed.
  clearTimeout(window.__bbSeqTimer);
  window.__bbSeqTimer = setTimeout(() => {
    // WIN-SYNC: snap the DEFERRED displayed score to the logical score so the marker
    // reaches the END (frac>=1 → meets the target circle) before the result dim appears.
    // The in-flight "+N" flies animated the rise during `showDelay`; this guarantees the
    // bar is complete at the climax even if a fly was still mid-air. (setScoreTrack's
    // frac>=1 overlap behavior is unchanged — updateHUD just reaches it now.)
    _displayedScore = game.state().score; updateHUD();
    // ⑦ GOAL-CONFIRM beat: emphasize the goal HUD (score track / gem chips) — run it CONCURRENTLY
    // with the rainbow's tail (fire-and-forget), so it does NOT add delay AFTER the rainbow.
    playGoalConfirm(pr.type);
    // ㊻v3: show the result the INSTANT the rainbow finishes sweeping (USER REQ: 결과창 즉시) —
    // GOAL_CONFIRM_LEAD after this point lands exactly at the rainbow's visual end (showDelay
    // was set above to that cue). No extra beat.
    window.__bbSeqTimer = setTimeout(() => {
      _displayedScore = game.state().score; updateHUD();
      nextWrap.classList.add('show');           // state marker: the Well Done layer is up
      document.body.classList.add('sc-dim');    // darken the full viewport (incl. letterbox margins) to match the dim
      effects.playStageClear({
        levelNum, isLast: last,
        nextBtn,                                 // mounted into the layer AFTER the text wipe
        onSfx: () => audio.play('stageclear'),   // fire the fanfare ONCE here (not doubled)
        palette: game.palette,
        boardRect: boardRectOf(),                // position the layer OVER the board (SSOT)
      });
    }, GOAL_CONFIRM_LEAD);
  }, Math.max(0, showDelay - GOAL_CONFIRM_LEAD));
}

nextBtn.onclick = () => {
  audio.play('button');
  nextWrap.classList.remove('show');
  // GAMEREELS run-cap: do not advance past RT.to. On the default full run (to=100)
  // RT.to-1 === STAGES.length-1, so this is the existing "replay from the start"
  // behavior. For a limited run, replaying restarts at RT.from (the run's start).
  if (stageIndex >= STAGES.length - 1 || stageIndex >= RT.to - 1) gotoStage(RT.from - 1);
  else gotoStage(stageIndex + 1);
};

window.addEventListener('resize', () => { if (game) layout(); });

// (sound mute toggle button removed per user req 2026-06-22 — audio plays by default;

// ── DEV stage selector (top-right) — prev/next to quickly browse the adventure stages.
// A development convenience (not a player feature): it calls the SAME gotoStage() the
// adventure uses, so loading/feeder/HUD all behave exactly like normal play. The label
// shows the current stage and disables at the ends; tapping it jumps to a typed stage.
const devPrev = el('dev-prev'), devNext = el('dev-next'), devLabel = el('dev-label');
function updateDevStage() {
  if (!devLabel) return;
  devLabel.textContent = 'Lv.' + (stageIndex + 1);
  devPrev.disabled = stageIndex <= 0;
  devNext.disabled = stageIndex >= STAGES.length - 1;
}
if (devPrev) {
  devPrev.addEventListener('click', () => { audio.play('button'); gotoStage(stageIndex - 1); });
  devNext.addEventListener('click', () => { audio.play('button'); gotoStage(stageIndex + 1); });
  devLabel.addEventListener('click', () => {
    const ans = prompt('Jump to stage (1–' + STAGES.length + '):', String(stageIndex + 1));
    if (ans == null) return;
    const n = parseInt(ans, 10);
    if (Number.isFinite(n)) gotoStage(n - 1);
  });
}
// SECRET reveal: 3 quick taps in the in-game TOP-LEFT corner toggle the dev selector on/off
// (hidden by default, no on-screen hint — USER REQ 2026-06-22). Taps must be quick (≤1.5s
// apart) or the counter resets, so normal corner taps never accidentally reveal it.
const devHotspot = el('dev-hotspot');
const devStageEl = el('dev-stage');
// GAMEREELS (reels playable): the stage selector is a DEV CHEAT (lets you skip/jump
// stages). In a reels build a real player must NOT be able to cheat, so ALL reveal
// paths — the 3-tap top-left hotspot, the 'Q' key, and the ?dev=1 force-show — are
// disabled when GR.active (?gamereels / window.__GAMEREELS). The default (non-reels)
// build keeps every dev path for our own testing. (USER REQ 2026-06-23)
if (!GR.active) {
  let devTaps = 0, devTapTimer = 0;
  if (devHotspot) devHotspot.addEventListener('click', () => {
    devTaps++;
    clearTimeout(devTapTimer);
    devTapTimer = setTimeout(() => { devTaps = 0; }, 1500);
    if (devTaps >= 3) { devTaps = 0; if (devStageEl) devStageEl.classList.toggle('dev-on'); }
  });
  // DEV toggle via keyboard 'Q' (desktop convenience — USER REQ 2026-06-22): enter/exit dev mode.
  window.addEventListener('keydown', (e) => {
    if ((e.key === 'q' || e.key === 'Q') && !e.repeat && devStageEl) devStageEl.classList.toggle('dev-on');
  });
  // ?dev=1 force-shows the dev stage selector on boot (default dev=off → no change).
  if (RT.dev && devStageEl) devStageEl.classList.add('dev-on');
}

// ── HOST-DELEGATED PROGRESS bridge (game ⇄ app) ───────────────────────────────
// bridgeState() builds the canonical GameState payload. currentStage defaults to the
// loaded stage (stageIndex+1); a clear passes the NEXT stage explicitly so a save taken
// on the "Well Done" overlay restores to the upcoming stage (spec example: cleared 30 →
// {clearedStages:30, currentStage:31}). currency/items are passed through untouched.
function bridgeState(curStage) {
  const cur = (curStage != null) ? (curStage | 0) : ((stageIndex | 0) + 1);
  return {
    clearedStages: clearedStages | 0,
    currentStage: Math.max(1, Math.min(STAGES.length, cur)),
    currency: currency || {},
    items: items || {},
  };
}
// game → host: persist NOW (no-op when GR inactive). Save points (USER REQ): stage end
// (clear/gameover), app backgrounded (pagehide/visibilitychange→hidden), item use.
function bridgeSaveState(curStage) { try { if (GR.active) GR.gameState(bridgeState(curStage)); } catch (e) {} }
// host → game: restore. The host's payload is the source of truth → jump to currentStage.
function bridgeRestore(data) {
  if (!data || typeof data !== 'object') return;
  if (data.currency && typeof data.currency === 'object') currency = data.currency;   // round-trip verbatim
  if (data.items && typeof data.items === 'object') items = data.items;
  if (Number.isFinite(+data.clearedStages)) clearedStages = Math.max(0, +data.clearedStages | 0);
  // currentStage wins; if absent, resume just after the last cleared stage.
  const cur = Number.isFinite(+data.currentStage) ? (+data.currentStage | 0) : (clearedStages + 1);
  const idx = Math.max(0, Math.min(STAGES.length - 1, cur - 1));
  gotoStage(idx);   // async fire-and-forget — load the saved stage
}
if (GR.active) {
  GR.provideState(() => bridgeState());   // RequestState → emit current state
  GR.onState(bridgeRestore);              // inbound GameState → restore
  // app backgrounded / closing → flush a save (covers "뒤로가기" + OS suspend).
  const _bgSave = () => { if (document.visibilityState === 'hidden') bridgeSaveState(); };
  window.addEventListener('pagehide', () => bridgeSaveState());
  document.addEventListener('visibilitychange', _bgSave);
}

// ── boot: editor play-test injection (L22) OR default stage001 ────────────────
async function boot() {
  // editor "Play test" injects a level via sessionStorage (same origin)
  if (location.search.includes('playtest=1')) {
    const raw = sessionStorage.getItem('__BB_PLAYTEST');
    if (raw) { await loadLevel(JSON.parse(raw), DEBUG ? 12345 : null); if (GR.active) GR.gameStart(); return; }
  }
  // GAMEREELS: start the adventure at RT.from (1-based → ordered index from-1).
  // Default from=1 → gotoStage(0) → unchanged (stage001 onboarding). gotoStage clamps.
  await gotoStage(RT.from - 1);
  // BOOT GATE (USER REPORT 2026-06-23): hold off grabbing until the first-load main-thread
  // work has settled. A grab during the saturation window has its move/up dropped by iOS
  // WKWebView → the piece lifts but is stuck. We unlock once the renderer sprites are ready
  // AND the deferred asset bulk is merged (forced now, off the post-gate path) AND a paint
  // has happened — so the very first grab only starts when touch events flow reliably.
  if (input) {
    input.setReady(false);
    let unlocked = false;
    const unlock = () => {
      if (unlocked) return; unlocked = true;
      try { if (window.__mergeAssetsLazy) window.__mergeAssetsLazy(); } catch (e) {}  // do the (cheap) lazy parse now, not after unlock
      // EAGER audio init DURING the gate (off-grab): the webview allows autoplay (USER 2026-06-24),
      // so we do the ~140ms audio unlock HERE rather than on the first grab gesture — neither the
      // grab's pointerdown nor its pointerup touches audio → no main-thread hitch → no stuck block.
      try { audio.unlockEager(); } catch (e) {}
      requestAnimationFrame(() => requestAnimationFrame(() => { if (input) input.setReady(true); }));
    };
    renderer.imgs.ready.then(unlock);
    setTimeout(unlock, 3000);   // fallback — never stay locked out
  }
  // GAMEREELS: signal the webview host that the playable is up (no-op when GR inactive).
  if (GR.active) GR.gameStart();
}
boot();

// ── DEBUG API (window.__BB, §8) — only when ?debug=1 or window.__BB_DEBUG ─────
if (DEBUG) {
  window.__BB = {
    async load(levelJson, seed) {
      if (typeof levelJson === 'string') levelJson = await (await fetch(levelJson)).json();
      await loadLevel(levelJson, seed);
      return game.state();
    },
    state() { return game.state(); },
    // logical placement (NO coordinate tap — L39). When a tutorial is active, also
    // notify the controller so step gating advances exactly as a real drag would.
    place(idx, x, y) {
      const accept = !tutorial || tutorial.isAcceptableDrop(idx, x, y);
      if (!accept) return { ok: false, reason: 'tutorial-gate' };
      const r = game.placeAt(idx, x, y);

      // FIX C — mirror the real drop path: a refilling placement starts the host
      // reveal delay (so QA can verify the new tray is suppressed during the window).

    },
    // FIX C QA hooks: inspect/await the refill-reveal window deterministically.
    refillState() { return { refillPending, traySuppressed: input ? input.traySuppressed : false }; },
    // adventure progression: jump to an ordered stage (0=tutorial,1=collect,2=score)
    async gotoStage(i) { await gotoStage(i); return { stageIndex, state: game.state() }; },
    stageIndex() { return stageIndex; },
    // HOST-DELEGATED PROGRESS QA hooks (USER REQ 2026-06-23): inspect the GameState
    // payload, force a save (game→host), and simulate a host restore (host→game).
    bridgeState() { return bridgeState(); },
    saveProgress(curStage) { bridgeSaveState(curStage); return bridgeState(curStage); },
    restore(data) { bridgeRestore(data); return { stageIndex, clearedStages, currency, items }; },
    // tutorial introspection for QA (current step, gates, etc.)
    tutorial() { return tutorial ? {
      active: tutorial.active, stepIndex: tutorial.stepIndex,
      steps: tutorial.steps.length, current: tutorial.current(),
    } : null; },
    // heuristic autoplay for n moves; returns trace
    autoPlay(n) { return autoPlay(n); },
    // feeder balance over many seeds (adaptive). returns aggregate stats.
    feederStats(runs, opts) { return feederStats(runs, opts); },
    // space-aware / multi-clear feeder probes over many seeds (deterministic).
    feederProbe(opts) { return feederProbe(opts); },
    // PERF (JOB 2): time the adaptive feeder on the heaviest realistic board
    // (open board + a contiguous block of near-full lines — the best-of-N + multi-
    // clear DFS worst case). Times `iters` real feedTray calls with performance.now()
    // and returns ms stats. Pure measurement; touches no committed game state.
    timeFeed(opts) { return timeFeed(opts); },
    // hot-swap look (L16)
    setLook(json) { renderer.setLook(json || {}); renderer.draw(game.state()); return renderer.look; },
    // deterministic tray injection for QA (force known pieces; bypasses the feeder)
    setTray(pieceIds, colors) {
