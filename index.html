        const p = window.__BB_PIECE_BY_ID[id];
        return p ? { id: p.id, sizeTag: p.sizeTag, cells: p.cells, color: (colors && colors[i]) || pal[0] } : null;
      });
      game._checkGameOver(); onChange(); return game.state();
    },
    // stage-clear sweep schedule (the boustrophedon SSOT) — for the PUP row-alternating
    // assertion (deterministic; no DOM/timers). Mirrors what playStageClear lights up.
    sweepSchedule() { return effects ? effects.sweepSchedule() : null; },
    // expose internals for deeper QA
    _game: () => game, _level: () => currentLevel, _seed: () => currentSeed,
    _input: () => input, // drag-cancel QA: inspect the live drag state (CHANGE 2)
    _effects: () => effects, // stage-clear sequence QA
    // DEFERRED SCORE QA: snap the displayed score to logical NOW (the score-gain flies
    // tick it up asynchronously; tests call this to read the marker deterministically).
    reconcileScore() { reconcileDisplayed(); return _displayedScore; },
  };
  console.log('[__BB] debug API active (seed=' + currentSeed + ')');
}

// ── heuristic auto-player (used by __BB.autoPlay + feederStats) ───────────────
// Greedy: for each tray piece, try every position; score = linesCleared*1000 +
// (prefers filling rows/cols, lower fragmentation). Plays best move each step.
//
// MISSION-AWARE (so the verifier behaves like a real player): on a `collect`
// mission it strongly rewards clears that actually COLLECT a gem, and—because gems
// are now SPREAD ~1 per line (stage002 redesign)—it also rewards placements that
// push a gem-bearing line toward completion. Without this the greedy player would
// chase any easy clear and choke before collecting the spread-out gems. It changes
// NOTHING about game rules or the feeder; it only picks better moves. (FIX B)
function _gemBearingLineProgress(g) {
  // For each row/col that contains an uncleared mission gem, how close it is to full
  // (filledInLine / lineLen). Returns the SUM of those fractions — a placement that
  // raises it is making progress toward a gem clear. Cheap: O(cells) once per call.
  const b = g.board, cols = b.cols, rows = b.rows;
  if (!b.items.size) return 0;
  const gemRows = new Set(), gemCols = new Set();
  for (const cell of b.items.keys()) { gemRows.add((cell / cols) | 0); gemCols.add(cell % cols); }
  let prog = 0;
  for (const y of gemRows) { let f = 0; for (let x = 0; x < cols; x++) if (b.cells[b.idx(x, y)] !== 0) f++; prog += f / cols; }
  for (const x of gemCols) { let f = 0; for (let y = 0; y < rows; y++) if (b.cells[b.idx(x, y)] !== 0) f++; prog += f / rows; }
  return prog;
}
// "focus": (closest gem line fullness)² → commit to finishing ONE gem line (kills the
// long-tail wandering where the player keeps the board open but never finishes a gem).
function _gemFocus(g) {
  const b = g.board, cols = b.cols, rows = b.rows;
  if (!b.items.size) return 0;
  const gemRows = new Set(), gemCols = new Set();
  for (const cell of b.items.keys()) { gemRows.add((cell / cols) | 0); gemCols.add(cell % cols); }
  let best = 0;
  for (const y of gemRows) { let f = 0; for (let x = 0; x < cols; x++) if (b.cells[b.idx(x, y)] !== 0) f++; const r = f / cols; if (r > best) best = r; }
  for (const x of gemCols) { let f = 0; for (let y = 0; y < rows; y++) if (b.cells[b.idx(x, y)] !== 0) f++; const r = f / rows; if (r > best) best = r; }
  return best * best;
}
function pickBestMove(g) {
  let best = null;
  const t = g.progress && g.progress.type;
  const gemAware = (t === 'collect' || t === 'combo');
  for (let ti = 0; ti < g.tray.length; ti++) {
    const piece = g.tray[ti];
    if (!piece) continue;
    for (let oy = 0; oy < g.board.rows; oy++) {
      for (let ox = 0; ox < g.board.cols; ox++) {
        if (!g.board.canPlace(piece, ox, oy)) continue;
        const snap = g.board.snapshot();
        g.board.place(piece, ox, oy, 'x');
        const lines = g.board.fullLines();
        const lc = lines.rows.length + lines.cols.length;
        let gemsCollected = 0;
        if (lc > 0) { const ci = g.board.clearLines(lines); gemsCollected = ci.items.length; }
        const fill = g.board.filledCount();
        const maxReg = g.board.maxEmptyRegion();
        // gem-line progress is read AFTER any clear (gems on cleared lines are gone).
        const gemProg = gemAware ? _gemBearingLineProgress(g) : 0;
        g.board.restore(snap);
        // heuristic: clear lines, then keep board open (low fill, big empty region).
        // On collect/combo a clear that COLLECTS a gem is worth far more than a plain
        // clear, and we nudge toward completing gem-bearing lines (gemProg).
        const sc = lc * 1000 + gemsCollected * 5000 + gemProg * 60 - fill * 2 + maxReg;
        if (!best || sc > best.sc) best = { ti, ox, oy, sc };
      }
    }
  }
  return best;
}

// ── WHOLE-TRAY PLANNER (the strong auto-player; mirrors scripts/verify_lib.mjs) ──
// A myopic one-piece greedy chokes more than a real player. The planner finds the best
// ordering+placement of ALL present tray pieces (bounded DFS), scoring the FINAL board
// (cleared lines + collected gems + openness + gem focus), and returns the first move of
// the best plan. This makes __BB.autoPlay clear stages a careful player can clear, so the
// in-browser spot-check agrees with the node 100-stage verifier. Determinism preserved.
const _PLAN_POS_CAP = 9;
function _evalBoardPlan(g, gemAware) {
  const fill = g.board.filledCount(), maxReg = g.board.maxEmptyRegion();
  const gemProg = gemAware ? _gemBearingLineProgress(g) : 0;
  const focus = gemAware ? _gemFocus(g) : 0;
  return gemProg * 120 + focus * 1200 - fill * 2 + maxReg;
}
function _candPlacements(g, piece) {
  const cands = [];
  const C = g.board.cells, cols = g.board.cols, rows = g.board.rows, cell = piece.cells;
  for (let oy = 0; oy < rows; oy++) for (let ox = 0; ox < cols; ox++) {
    let ok = true;
    for (let q = 0; q < cell.length; q++) { const x = ox + cell[q][0], y = oy + cell[q][1]; if (x < 0 || y < 0 || x >= cols || y >= rows || C[y * cols + x] !== 0) { ok = false; break; } }
    if (!ok) continue;
    for (let q = 0; q < cell.length; q++) C[(oy + cell[q][1]) * cols + (ox + cell[q][0])] = 's';
    let lc = 0, gems = 0;
    for (let y = 0; y < rows; y++) { let full = true; const b = y * cols; for (let x = 0; x < cols; x++) if (C[b + x] === 0) { full = false; break; } if (full) { lc++; for (let x = 0; x < cols; x++) if (g.board.items.has(b + x)) gems++; } }
    for (let x = 0; x < cols; x++) { let full = true; for (let y = 0; y < rows; y++) if (C[y * cols + x] === 0) { full = false; break; } if (full) { lc++; for (let y = 0; y < rows; y++) if (g.board.items.has(y * cols + x)) gems++; } }
    for (let q = 0; q < cell.length; q++) C[(oy + cell[q][1]) * cols + (ox + cell[q][0])] = 0;
    cands.push({ ox, oy, rank: lc * 1000 + gems * 6000 + (ox + oy) });
  }
  cands.sort((a, b) => b.rank - a.rank);
  return cands.slice(0, _PLAN_POS_CAP);
}
function _planTray(g) {
  const t = g.progress && g.progress.type;
  const gemAware = (t === 'collect' || t === 'combo');
  const trayIdx = [];
  for (let i = 0; i < g.tray.length; i++) if (g.tray[i]) trayIdx.push(i);
  let best = null;
  const used = new Array(g.tray.length).fill(false);
  const dfs = (accReward, firstMove) => {
    let placedAny = false;
    for (const ti of trayIdx) {
      if (used[ti]) continue;
      const piece = g.tray[ti];
      const cands = _candPlacements(g, piece);
      for (const c of cands) {
        placedAny = true;
        const snap = g.board.snapshot();
        g.board.place(piece, c.ox, c.oy, 'x');
        const lines = g.board.fullLines();
        const lc = lines.rows.length + lines.cols.length;
        let gems = 0; if (lc > 0) { const ci = g.board.clearLines(lines); gems = ci.items.length; }
        used[ti] = true;
        dfs(accReward + lc * 1000 + gems * 6000, firstMove || { ti, ox: c.ox, oy: c.oy });
        used[ti] = false;
        g.board.restore(snap);
      }
    }
    if (!placedAny) {
      const score = accReward + _evalBoardPlan(g, gemAware);
      if (firstMove && (!best || score > best.score)) best = { firstMove, score };
    }
  };
  dfs(0, null);
  if (!best) { const mv = pickBestMove(g); return mv ? { ti: mv.ti, ox: mv.ox, oy: mv.oy } : null; }
  return best.firstMove;
}

function autoPlay(n) {
  const trace = [];
  for (let k = 0; k < n; k++) {
    if (game.over || game.cleared) break;
    const mv = _planTray(game);          // strong whole-tray planner
    if (!mv) break; // no legal move → game over will be detected
    const r = game.placeAt(mv.ti, mv.ox, mv.oy);
    trace.push({ move: k, ...mv, lines: r.lines, score: r.score, combo: r.combo,
      mode: game.lastFeed?.mode, danger: +game.state().danger.toFixed(3) });
  }
  onChange();
  return { moves: trace.length, over: game.over, stageClear: game.cleared, score: game.score, trace };
}

// ── feeder balance: adaptive vs pure-random baseline ─────────────────────────
// Runs N seeded games to game-over (or a move cap) with the SAME greedy player.
// `pureRandom:true` replaces the adaptive feeder with a uniform-random feeder
// (same RNG stream type) to prove the adaptive feeder yields longer lifespans.
function runOne(level, seed, pureRandom, moveCap, feederOverride) {
  // feederOverride lets QA compare the NEW config against an OLD-config snapshot on
  // the SAME seeds (CHANGE 2 before/after). Merged on top of the level's own feeder.
  const lvl2 = feederOverride
    ? { ...level, feeder: { ...(level.feeder || {}), ...feederOverride } }
    : level;
  const cfg = mergeConfig(DEFAULT_CONFIG, { feeder: lvl2.feeder || {} });
  const rng = makeRng(seed);
  const g = new Game(lvl2, rng);

  if (pureRandom) {
    // override the tray feeder with a uniform-random one (no D/T shaping, no guard)
    g._refillTray = function () {
      const res = feedUniform(this.board, {
        rng: this.rng, palette: this.palette, trayCount: this.trayCount,
      });
      this.tray = res.pieces.slice();
      this.lastFeed = res;
      return res;
    };
    // re-seed first tray under the uniform feeder for a fair comparison
    g.tray = []; g._refillTray(); g._checkGameOver();
  }

  // per-game telemetry (CHANGE 2 verification): clears, mode mix, dead-end (a refill
  // that was NOT survivable — the feeder forced an unavoidable game-over), feed count.
  let moves = 0, fillSum = 0, clears = 0, multiClears = 0;
  let feeds = 0, pressureFeeds = 0, rescueFeeds = 0, deadEndFeeds = 0;
  // count the initial tray's feed (the first refill ran in the Game constructor).
  const countFeed = () => {
    const lf = g.lastFeed; if (!lf || lf.mode === 'uniform' || lf.mode === 'tutorial') return;
    feeds++;
    if (lf.mode === 'pressure') pressureFeeds++;
    if (lf.mode === 'rescue') rescueFeeds++;
    // a "dead end" = a refill whose 3-piece set is NOT jointly survivable (the player
    // is doomed to a forced game-over from that set). survivable===false flags it.
    if (lf.survivable === false) deadEndFeeds++;
  };
  countFeed();
  while (!g.over && !g.cleared && moves < moveCap) {
    const mv = pickBestMove(g);
    if (!mv) break;
    const trayBefore = g.tray.filter((p) => p != null).length;
    const r = g.placeAt(mv.ti, mv.ox, mv.oy);
    if (r.lines > 0) { clears++; if (r.lines >= 2) multiClears++; }
    // a refill happened iff the tray emptied on this placement (then was refilled).
    const trayAfter = g.tray.filter((p) => p != null).length;
    if (trayAfter > trayBefore - 1) countFeed(); // tray grew back → a fresh feed ran
    fillSum += g.board.filledCount() / g.board.size;
    moves++;
  }
  return {
    moves, over: g.over, cleared: g.cleared, avgFill: fillSum / Math.max(1, moves),
    clears, multiClears, feeds, pressureFeeds, rescueFeeds, deadEndFeeds,
    clearsPerPlacement: clears / Math.max(1, moves),
  };
}

// uniform feeder (baseline) — same shape as feedTray output, no adaptation.
function feedUniform(board, ctx) {
  // local import via module-level PIECES through feeder? keep simple: reuse window cache
  const { rng, palette, trayCount } = ctx;
  const PIECES = window.__BB_PIECES;
  const paletteKeys = Object.keys(palette);
  const pieces = [];
  for (let i = 0; i < trayCount; i++) {
    const p = PIECES[rng.int(PIECES.length)];
    pieces.push({ id: p.id, sizeTag: p.sizeTag, cells: p.cells, color: paletteKeys[rng.int(paletteKeys.length)] });
  }
  return { pieces, mode: 'uniform', D: 0, T: 0, survivable: null, resamples: 0 };
}

function feederStats(runs, opts = {}) {
  const moveCap = opts.moveCap || 400;
  const level = currentLevel;
  // for a fair lifespan test, use a SURVIVE-style sandbox: ignore mission clear so
  // games end on game-over, not on completing the collect mission.
  const sandbox = structuredClone(level);
  sandbox.mission = { type: 'survive', target: { moves: 1e9 }, moves: 1e9 };
  sandbox.items = [];
  sandbox.tutorial = null; // feeder-balance must use the ADAPTIVE feeder, not the tutorial queue
  sandbox.preset = [];     // start from an empty board for a fair lifespan comparison

  const feederOverride = opts.feederOverride || null; // OLD-config snapshot for before/after
  let adaptSum = 0, randSum = 0, adaptFill = 0, randFill = 0, adaptDeaths = 0, randDeaths = 0;
  // CHANGE 2 telemetry aggregates (adaptive only — the balance knobs we tuned).
  let aClears = 0, aMoves = 0, aMulti = 0, aFeeds = 0, aPressure = 0, aRescue = 0, aDeadEnd = 0;
  for (let s = 0; s < runs; s++) {
    const a = runOne(sandbox, 1000 + s, false, moveCap, feederOverride);
    const r = runOne(sandbox, 1000 + s, true, moveCap);
    adaptSum += a.moves; randSum += r.moves; adaptFill += a.avgFill; randFill += r.avgFill;
    if (a.over) adaptDeaths++; if (r.over) randDeaths++;
    aClears += a.clears; aMoves += a.moves; aMulti += a.multiClears;
    aFeeds += a.feeds; aPressure += a.pressureFeeds; aRescue += a.rescueFeeds; aDeadEnd += a.deadEndFeeds;
  }
  return {
    runs,
    adaptive: {
      avgLifespan: adaptSum / runs, avgFill: +(adaptFill / runs).toFixed(3), deathRate: +(adaptDeaths / runs).toFixed(3),
      // CHANGE 2: dopamine + ease metrics over the whole adaptive corpus.
      clearsPerPlacement: +(aClears / Math.max(1, aMoves)).toFixed(3),  // how often a placement clears ≥1 line
      multiClearsPerPlacement: +(aMulti / Math.max(1, aMoves)).toFixed(3),
      pressureFeedFrac: +(aPressure / Math.max(1, aFeeds)).toFixed(3),  // share of feeds in PRESSURE (want LOW)
      rescueFeedFrac: +(aRescue / Math.max(1, aFeeds)).toFixed(3),
      deadEndFeedFrac: +(aDeadEnd / Math.max(1, aFeeds)).toFixed(4),    // share of feeds that were a forced dead-end (want ~0)
      totalFeeds: aFeeds, totalPlacements: aMoves,
    },
    random:   { avgLifespan: randSum / runs, avgFill: +(randFill / runs).toFixed(3), deathRate: +(randDeaths / runs).toFixed(3) },
  };
}

// expose PIECES for the uniform baseline + setTray helper (debug-only)
import('./engine/pieces.js?v=20260624123400').then((m) => {
  window.__BB_PIECES = m.PIECES; window.__BB_PIECE_BY_ID = m.PIECE_BY_ID;
  window.__BB_BIG_BOX_IDS = m.BIG_BOX_IDS; window.__BB_isBigBox = m.isBigBox;
});

// ── feeder PROBE: space-aware big-box bias + multi-line-clear potential ───────
// Deterministic, seeded stats over many feeds on synthetic boards. Used by the
// C5/C6 QA assertions (USER REQ #2/#3 verification). Builds a Board with a preset
// fn, runs feedTray over `seeds` seeds, and aggregates:
//   • bigBoxFeedFrac  = fraction of feeds whose 3-piece SET contains ≥1 big box
//                       (square3/rect2x3/rect3x2).
//   • multiClear2Frac = fraction of feeds whose SET can clear ≥2 lines together
//                       (via setMaxClear on the SAME board the feed saw).
// All boards are 8×8. Pure: each feed gets a fresh board (feedTray never mutates).
function feederProbe(opts = {}) {
  const seeds = opts.seeds || 240;
  const baseSeed = opts.baseSeed || 5000;
  const stageIndex = opts.stageIndex || 0;
  const score = opts.score || 0;
  const cfg = mergeConfig(DEFAULT_CONFIG, opts.feeder ? { feeder: opts.feeder } : {}).feeder;
  const palette = { b: '#4FA3FF', g: '#5BD08B', r: '#FF6B6B' };
  const PIECE_BY_ID = window.__BB_PIECE_BY_ID;
  const isBigBox = window.__BB_isBigBox;

  // preset describes filled cells: a function (board)→void, or array of [x,y].
  const applyPreset = (board) => {
    if (typeof opts.preset === 'function') opts.preset(board);
    else if (Array.isArray(opts.preset)) for (const [x, y] of opts.preset) board.cells[board.idx(x, y)] = 'b';
  };

  let bigFeeds = 0, bigPieces = 0, totalPieces = 0, multi2 = 0, maxClearSum = 0;
  let sampleAvg = 0;
  for (let s = 0; s < seeds; s++) {
    const board = new Board(8, 8);
    applyPreset(board);
    const rng = makeRng(baseSeed + s);
    const res = feedTray(board, { rng, cfg, score, combo: 0, stageIndex, palette, trayCount: 3 });
    let hasBig = false;
    for (const p of res.pieces) { totalPieces++; if (isBigBox(p)) { bigPieces++; hasBig = true; } }
    if (hasBig) bigFeeds++;
    if (res.sampled) sampleAvg += res.sampled;
    // re-create the same board the feed evaluated against, then measure the SET's
    // joint multi-clear potential (the feed cleared nothing, so the board is intact).
    const probe = new Board(8, 8); applyPreset(probe);
    const set = res.pieces.map((p) => PIECE_BY_ID[p.id]);
    const mc = setMaxClear(probe, set, cfg);
    maxClearSum += mc;
    if (mc >= 2) multi2++;
  }
  return {
    seeds,
    bigBoxFeedFrac: +(bigFeeds / seeds).toFixed(3),
    bigBoxPieceFrac: +(bigPieces / totalPieces).toFixed(3),
    multiClear2Frac: +(multi2 / seeds).toFixed(3),
    avgMaxClear: +(maxClearSum / seeds).toFixed(2),
    avgSampled: +(sampleAvg / seeds).toFixed(1),
  };
}

// uniform-baseline multi-clear probe: same boards, but pieces drawn UNIFORMLY (no
// adaptive bias) → shows how much the multi-clear bias lifts the ≥2 rate (USER #3).
function feederProbeUniform(opts = {}) {
  const seeds = opts.seeds || 240;
  const baseSeed = opts.baseSeed || 5000;
  const cfg = mergeConfig(DEFAULT_CONFIG, {}).feeder;
  const palette = { b: '#4FA3FF', g: '#5BD08B', r: '#FF6B6B' };
  const PIECES = window.__BB_PIECES, PIECE_BY_ID = window.__BB_PIECE_BY_ID, isBigBox = window.__BB_isBigBox;
  const applyPreset = (board) => {
    if (typeof opts.preset === 'function') opts.preset(board);
    else if (Array.isArray(opts.preset)) for (const [x, y] of opts.preset) board.cells[board.idx(x, y)] = 'b';
  };
  let bigFeeds = 0, multi2 = 0;
  for (let s = 0; s < seeds; s++) {
    const rng = makeRng(baseSeed + s);
    const res = feedUniform(new Board(8, 8), { rng, palette, trayCount: 3 });
    if (res.pieces.some(isBigBox)) bigFeeds++;
    const probe = new Board(8, 8); applyPreset(probe);
    const set = res.pieces.map((p) => PIECE_BY_ID[p.id]);
    if (setMaxClear(probe, set, cfg) >= 2) multi2++;
  }
  return { seeds, bigBoxFeedFrac: +(bigFeeds / seeds).toFixed(3), multiClear2Frac: +(multi2 / seeds).toFixed(3) };
}
window.__BB_feederProbeUniform = feederProbeUniform;

// ── PERF (JOB 2): time the adaptive feeder on the heaviest realistic board ────
// The refill (feedTray) is the most likely mobile hitch: best-of-N candidate sets ×
// survivability DFS × bounded setMaxClear DFS. Its worst case is an OPEN board with
// a contiguous block of NEAR-FULL lines (big boxes chain multi-clears → the DFS
// explores the most). We build that board and time `iters` real feedTray calls with
// performance.now(), returning ms stats. Pure measurement (feedTray never mutates a
// committed board; each call gets its own seeded RNG so it's deterministic).
function timeFeed(opts = {}) {
  const iters = opts.iters || 60;
  const baseSeed = opts.baseSeed || 9000;
  const stageIndex = opts.stageIndex ?? 0;
  const score = opts.score ?? 0;
  const cfg = mergeConfig(DEFAULT_CONFIG, opts.feeder ? { feeder: opts.feeder } : {}).feeder;
  const palette = { b: '#4FA3FF', g: '#5BD08B', r: '#FF6B6B' };

  // WORST-CASE preset: leave the board mostly open but fill several rows to ONE empty
  // cell each (near-full) so the multi-clear DFS has the most to chase. This mirrors
  // the config comment's heaviest scenario (open board + contiguous near-full lines).
  const buildWorst = (board) => {
    // rows 4,5,6,7 near-full (cols 0..6 filled, col 7 empty) → 4 near-full lines, and
    // col 7 itself becomes near-full too. Rows 0..3 stay open (roomy → big boxes).
    for (let y = 4; y <= 7; y++) for (let x = 0; x <= 6; x++) board.cells[board.idx(x, y)] = 'b';
  };
  // A lighter "typical" board (mid-game, a couple near-full lines) for a realistic
  // average alongside the worst case.
  const buildTypical = (board) => {
    for (let x = 0; x <= 6; x++) board.cells[board.idx(x, 7)] = 'b';      // 1 near-full row
    for (let y = 0; y <= 4; y++) board.cells[board.idx(0, y)] = 'b';      // 1 near-full col-ish
  };
  const scenarios = { worst: buildWorst, typical: buildTypical, empty: () => {} };
  const which = opts.scenario && scenarios[opts.scenario] ? { [opts.scenario]: scenarios[opts.scenario] } : scenarios;

  const out = {};
  for (const name of Object.keys(which)) {
    const times = [];
    // warm-up (JIT) — not counted.
    for (let w = 0; w < 5; w++) {
      const b = new Board(8, 8); which[name](b);
      feedTray(b, { rng: makeRng(baseSeed - 1 - w), cfg, score, combo: 0, stageIndex, palette, trayCount: 3 });
    }
    for (let i = 0; i < iters; i++) {
      const b = new Board(8, 8); which[name](b);
      const rng = makeRng(baseSeed + i);
      const t0 = performance.now();
      feedTray(b, { rng, cfg, score, combo: 0, stageIndex, palette, trayCount: 3 });
      times.push(performance.now() - t0);
    }
    times.sort((a, z) => a - z);
    const sum = times.reduce((s, v) => s + v, 0);
    out[name] = {
      iters,
      min: +times[0].toFixed(2),
      median: +times[(times.length / 2) | 0].toFixed(2),
      p95: +times[Math.min(times.length - 1, Math.floor(times.length * 0.95))].toFixed(2),
      max: +times[times.length - 1].toFixed(2),
      mean: +(sum / times.length).toFixed(2),
    };
  }
  return out;
}
