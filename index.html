<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Block Blast — Adventure (POC)</title>
<style>
  :root{
    --bg-top:#f5f7fb; --bg-bottom:#ffffff;       /* WHITE theme (user req ⑬) */
    --hud-text:#1b2440; --hud-dim:#9fb0d8; --accent:#ffc23d;
    --tap-min:44px; --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
  }
  *{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  html,body{ height:100%; overflow:hidden; background:var(--bg-bottom);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    user-select:none; -webkit-user-select:none; touch-action:none; color:var(--hud-text); }

  /* full-window background fills any letterbox (L12/L33: fully uniform, no bands).
     bg_page.webp (blue gradient) over a matching CSS gradient fallback. The image is
     a vertical gradient → stretch to cover the whole viewport incl. letterbox; the
     gradient fallback keeps the sides uniform if the image is wider/narrower. */
  /* WHITE page background (user req ⑬) — was a blue gradient image. */
  #bg{ position:fixed; inset:0; z-index:0; background:linear-gradient(180deg,#ffffff,#eef1f7); transition:background .28s ease; }
  /* STAGE-CLEAR: darken the FULL viewport — including the letterbox margins ABOVE/BELOW the
     fixed-aspect #stage box — so the result dim reads uniform edge-to-edge. The in-box .wd-dim
     covers the game area; this matches the margins to the same tone (#stage is a letterboxed
     box so its own dim can never reach the margins — L12). */
  body.sc-dim #bg{ background:#0b1022; }

  /* fixed portrait design box, centered (creates containing block for the HUD — L49) */
  #stage{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:100vw; height:100vh; max-width:56.25vh; max-height:177.78vw;
    overflow:hidden; z-index:1; display:flex; flex-direction:column;
  }

  /* GAMEREELS no-top-margin (USER REQ): in reels mode the play area must fill from the
     VERY TOP — ZERO top gap. Block Blast already has no top safe-area on the play box,
     so this is a DEFENSIVE guard against any host-injected safe-area-inset-top creeping
     into the layout (the OPPOSITE of the sibling cube_blast, which adds a 12svh top
     band). We pin the stage to the top and null the top safe-area inset. Default
     (non-reels) load is untouched — this block only applies under body.gamereels. */
  body.gamereels{ --safe-t:0px; }
  body.gamereels #stage{ top:0; transform:translateX(-50%); }
  body.gamereels #dev-stage{ top:8px; }

  /* ── top HUD: mission counter + score ── */
  /* goal HUD: full width (so the goal centers), small bottom gap to the grid below it. No
     top safe-area padding any more — it's no longer at the screen top (the mute button is). */
  #hud-top{ position:relative; padding:0 14px 2px; z-index:5; width:100%; }
  /* the GOAL (score track / gem targets) sits CENTERED just above the grid (reference). */
  #row1{ display:flex; align-items:center; justify-content:center; }
  /* mission: one or more gem chips (icon ABOVE remaining count) for collect, or a score/
     target readout for score missions — all CENTERED in a row (reference layout). */
  #mission{ display:flex; align-items:center; justify-content:center; gap:22px;
    font-weight:800; font-size:18px; min-height:48px; }
  .gem-chip{ display:flex; flex-direction:column; align-items:center; gap:0; }
  .gem-chip img{ width:40px; height:40px; object-fit:contain; display:block;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.4)); }
  .gem-chip .count{ font-weight:900; font-size:15px; min-width:18px; text-align:center;
    color:#44506e; text-shadow:0 1px 1px rgba(255,255,255,.5); margin-top:-2px; }
  .gem-chip.done .count{ color:#5bd08b; }
  /* score mission progress (CHANGE 3): a glossy horizontal capsule TRACK whose filled
     portion + a circular MARKER (current score) move left→right toward a darker TARGET
     circle at the right end; reaching it (100%) clears the stage (handled by the score
     mission logic — this is purely the visual). Casual/glossy to match the game. */
  #mission .score-mission{ display:flex; align-items:center; }
  /* EMBOSS/ENGRAVE RELIEF (USER REQ 2026-06-22, reference-matched): the progress track + goal are
     ENGRAVED (음각, sunken dark-navy groove + socket at the SAME depth); the current-score marker is
     EMBOSSED (양각, a raised bright-blue circle) that rides the groove and SEATS into the goal socket
     at 100%. Pure CSS (inset/outset shadows) for pixel-exact relief + fill alignment. */
  .score-track{ position:relative; width:150px; height:20px; border-radius:11px;
    background:linear-gradient(180deg,#19233f,#243155);
    box-shadow: inset 0 3px 5px rgba(0,0,0,.55), inset 0 -2px 3px rgba(255,255,255,.06),
      0 1px 0 rgba(255,255,255,.45); }
  /* progress FILL — bright amber, ENGRAVED into the same groove; left-aligned to the groove inner edge. */
  .score-track .fill{ position:absolute; left:3px; top:3px; bottom:3px; width:0%;
    min-width:12px; border-radius:8px;
    background:linear-gradient(180deg,#ffe08a,#ffc23d 55%,#ff9d12);
    box-shadow:inset 0 1px 2px rgba(255,255,255,.55), inset 0 -1px 2px rgba(150,90,0,.4);
    transition:width .22s ease-out; }
  /* GOAL socket = ENGRAVED (음각) circle at the right end, SAME dark-navy depth as the groove; orange number. */
  .score-track .target{ position:absolute; top:50%; right:-13px; width:34px; height:34px;
    transform:translateY(-50%); border-radius:50%;
    background:radial-gradient(circle at 50% 42%, #161f38, #232f52 72%, #2a3760);
    box-shadow: inset 0 3px 6px rgba(0,0,0,.7), inset 0 -2px 3px rgba(255,255,255,.07),
      0 1px 0 rgba(255,255,255,.4);
    display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size:12px; color:#ffc23d; text-shadow:0 1px 1px rgba(0,0,0,.65); z-index:2; }
  /* CURRENT marker = EMBOSSED (양각) raised bright-blue circle; SAME size as the socket so it SEATS in at 100%. */
  .score-track .marker{ position:absolute; top:50%; left:0%; width:34px; height:34px;
    transform:translate(-50%,-50%); border-radius:50%;
    background:radial-gradient(circle at 38% 28%, #d2ecff, #62b6ff 50%, #2f8fee 100%);
    border:1.5px solid rgba(255,255,255,.7);
    box-shadow: 0 3px 6px rgba(0,0,0,.45), inset 0 2px 3px rgba(255,255,255,.75),
      inset 0 -4px 5px rgba(0,55,130,.45);
    display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size:12px; color:#fff; text-shadow:0 1px 1px rgba(0,45,95,.6); z-index:3;
    transition:left .22s ease-out; }
  /* legacy single icon path (non-collect/score badge) */
  #mission .icon{ width:30px; height:30px; display:flex; align-items:center; justify-content:center;
    font-size:14px; filter:drop-shadow(0 2px 3px rgba(0,0,0,.4)); }
  #mission .icon.badge{ border-radius:50%; background:#ff5b5b; border:2px solid #fff; width:26px; height:26px; }
  #mission .icon img{ width:100%; height:100%; object-fit:contain; display:block; }
  /* the running score number is HIDDEN — the centered goal UI shows progress (the
     reference has no separate score readout). Kept in the DOM so updateHUD/debug still
     write to it without a null guard. */
  #score{ display:none; }
  #combo{ font-weight:800; font-size:14px; color:#ff8bd0; min-height:16px; text-align:center; }

  /* DEV stage selector (top-right) — quick prev/next browse of the adventure stages.
     A development tool (not a player feature); compact + semi-transparent. Can be gated
     behind a flag / removed before store release. */
  #dev-stage{ position:absolute; top:calc(8px + var(--safe-t)); right:10px; z-index:20;
    display:none; align-items:center; gap:2px; padding:3px;
    background:rgba(8,16,40,.5); border-radius:18px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.12), 0 2px 5px rgba(0,0,0,.35);
    -webkit-tap-highlight-color:transparent; user-select:none; }
  #dev-stage button{ border:none; background:transparent; color:#dfe7ff; cursor:pointer;
    font-weight:800; line-height:1; font-family:inherit; -webkit-tap-highlight-color:transparent; }
  #dev-prev, #dev-next{ width:30px; height:30px; border-radius:50%; font-size:14px;
    display:flex; align-items:center; justify-content:center; transition:background .12s ease; }
  #dev-prev:active, #dev-next:active{ background:rgba(255,255,255,.16); }
  #dev-prev:disabled, #dev-next:disabled{ opacity:.32; cursor:default; }
  #dev-label{ min-width:48px; height:30px; padding:0 6px; font-size:13px; border-radius:14px;
    background:rgba(0,0,0,.25); display:flex; align-items:center; justify-content:center; }
  #dev-label:active{ background:rgba(0,0,0,.4); }
  #dev-stage.dev-on{ display:flex; }       /* revealed only by the secret 3-tap hotspot */
  /* invisible secret hotspot (in-game TOP-LEFT corner) — 3 quick taps toggle the dev stage
     selector. NOTHING is drawn (USER REQ 2026-06-22); it sits over the empty corner so it
     never blocks gameplay (board/tray are centred + bottom). */
  #dev-hotspot{ position:absolute; left:0; top:0; width:58px; height:58px; z-index:30; background:transparent; }

  /* ── board area ── */
  /* board-wrap now stacks the GOAL HUD directly ON TOP of the grid (column), centered as a
     group, so the goal sits right above the board (user req). */
  #board-wrap{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:6px; position:relative; }
  /* VIVID blocks (user req ⑮): the saturate(1.5) contrast(1.12) boost is now BAKED INTO the
     block_*.webp sprites (tools bake_filter.mjs) — so the runtime CSS `filter` is REMOVED from the
     board / tray / drag-ghost surfaces. iOS Safari re-rasterized a CSS-filtered CANVAS on EVERY
     board redraw during a drag (the dominant per-frame cost on an iPhone 17 Pro: profiling showed
     a filtered #board added ~20% to the main-frame budget + ~doubled compositing/Layerize work,
     with the canvas resource re-produced on every ghost transition). The look is identical (the
     baked sprite matches the browser's CSS-filter output to ~1/255 per channel). */
  #board{ display:block; touch-action:none; }

  /* ── tray ── */
  #tray{ display:flex; justify-content:space-around; align-items:center; gap:8px;
    padding:8px 12px calc(8px + var(--safe-b)); height:140px; }
  .tray-slot{ flex:1; height:100%; max-width:33%; border-radius:14px; background:rgba(20,30,60,.045);
    display:flex; align-items:center; justify-content:center; cursor:grab; touch-action:none; }
  .tray-slot.lifted canvas{ opacity:.25; }
  .tray-slot canvas{ width:100%; height:100%; } /* ⑮ vivid boost now baked into the block sprites (no runtime filter) */
  /* FIX C — during the refill-reveal delay the new pieces are hidden + not grabbable;
     when revealed they pop/fade in so the fresh queue reads as a deliberate beat. */
  .tray-slot.tray-hidden{ cursor:default; }
  .tray-slot.tray-hidden canvas{ opacity:0; }
  .tray-slot canvas{ transition:opacity .18s ease-out, transform .22s cubic-bezier(.2,1.4,.4,1); }
  .tray-slot.tray-hidden canvas{ transform:scale(.6); }

  /* ── bottom mission progress bar ── */
  #progress-wrap{ height:14px; margin:0 14px 8px; background:rgba(0,0,0,.25); border-radius:7px; overflow:hidden; position:relative; }
  #progress-fill{ position:absolute; left:0; top:0; bottom:0; width:0%; background:var(--accent); border-radius:7px; transition:width .15s ease-out; }
  #progress-label{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; color:#0c1330; }

  /* ── floating drag ghost ── */
  /* floating held piece: position:fixed on <body> (NOT #stage) so it is NEVER clipped
     when dragged off the field; moved via GPU transform for a smooth, non-stiff drag. */
  /* size is set in JS (canvas = piece footprint at board cell size); only style here. */
  /* ⑮ vivid is now BAKED into the block sprites (the ghost canvas draws the same sprites) →
     the saturate/contrast filter is REMOVED. The drop-shadow on a CONTINUOUSLY-MOVING element
     forces iOS Safari to re-rasterize the filtered bitmap EVERY frame of the drag → jank. We keep
     a SOFT silhouette shadow (the piece is irregular so a box-shadow would shadow the bounding box,
     not the shape) but TRIM it (smaller blur/offset) so the per-frame re-raster is much cheaper,
     and the shadow is now its OWN cheap filter (no saturate/contrast chain to re-evaluate). */
  .drag-ghost{ position:fixed; left:0; top:0; pointer-events:none; z-index:9999;
    will-change:transform; filter:drop-shadow(0 4px 5px rgba(0,0,0,.38)); }

  /* ── effects layer (API sprite assets; director only places+times — GLOBAL C6/C7) ── */
  #fx{ position:absolute; inset:0; z-index:40; pointer-events:none; overflow:hidden; }
  #fx.fx-danger{ box-shadow:inset 0 0 0 6px rgba(255,60,60,.6); animation:dangerPulse .7s ease-out; }
  @keyframes dangerPulse{ 0%{ box-shadow:inset 0 0 0 2px rgba(255,60,60,.2);} 50%{ box-shadow:inset 0 0 0 10px rgba(255,60,60,.8);} 100%{ box-shadow:inset 0 0 0 6px rgba(255,60,60,0);} }
  #fx.fx-rescue{ background:radial-gradient(circle,rgba(120,255,200,.35),transparent 60%); animation:rescueFlash .5s ease-out; }
  @keyframes rescueFlash{ from{ opacity:1;} to{ opacity:0;} }

  /* gold "+score" popup (styled gold text — task: stays styled gold) */
  .fx-popup{ position:absolute; transform:translate(-50%,-50%); font-weight:900; font-size:20px;
    color:var(--accent); text-shadow:0 2px 4px rgba(0,0,0,.55), 0 0 8px rgba(255,194,61,.5);
    animation:popUp .8s ease-out forwards; }
  @keyframes popUp{ 0%{ opacity:0; transform:translate(-50%,-30%) scale(.6);} 25%{ opacity:1;} 100%{ opacity:0; transform:translate(-50%,-180%) scale(1.05);} }

  /* (DEAD — removed 2026-06-22) .fx-lineglow / -row / -col + @keyframes lineGlow used
     mix-blend-mode:screen + filter:sepia/hue-rotate (both iOS-hostile). No JS ever creates a
     .fx-lineglow element any more (the line-clear read is _lineBurst, the sweep is .fx-beam),
     so this was dead CSS that only risked accidental iOS-hostile reuse. */

  /* line-clear PREVIEW (CHANGE 1 + softened per user 2026-06-18): a SOFT, SUBTLE
     ORANGE OUTLINE framing the lines a valid held piece WOULD complete, BEFORE
     release. NOT a fill over the cells (the old white capsule covered the blocks —
     user disliked it): a rounded-rect BORDER with a GENTLE outer glow and a
     TRANSPARENT inside, so the blocks stay fully visible. The earlier glow was
     "too intense" → this version is THINNER (2px), with a much weaker/softer
     outer glow (smaller spread + lower opacity) and a slower, gentler pulse, so it
     reads as a light hint rather than a bright bar. Still orange, transparent fill. */
  .fx-linepreview-layer{ position:absolute; inset:0; pointer-events:none; z-index:1; }
  /* clearer than before (user asked for MORE visible): a 3px BLOCK-rounded outline with a
     stronger but still tasteful glow + a livelier pulse. Transparent fill so blocks show. */
  /* PERF: the pulse now animates ONLY `opacity` (a compositor-only property) instead of
     `box-shadow` + `border-color` (which re-rasterized the framed region every frame DURING a
     drag on iOS). The glow/border are set STATICALLY at the mid-bright value so the steady look
     is preserved; the gentle breathing is the opacity ramp (visually equivalent, GPU-cheap). */
  .fx-linepreview{ position:absolute; pointer-events:none; background:transparent;
    border:3px solid #FFC066; border-radius:9px;
    box-shadow:0 0 11px 1px rgba(255,178,65,.62), inset 0 0 8px 0 rgba(255,178,65,.36);
    animation:linePreviewPulse 1.1s ease-in-out infinite alternate; }
  @keyframes linePreviewPulse{
    from{ opacity:.84; }
    to{ opacity:1; } }
  /* CHANGE 3 (per fx_preview_rainbow_2plus.png): a placement that would clear 2+ lines at
     once frames those lines with a RAINBOW border instead of orange. The rainbow is painted
     as a gradient on the border RING via a padding/border-box mask (NOT border-image, which
     ignores border-radius and looked SHARP/angular) → so the corners are now ROUNDED, block-
     shaped, like the orange one. Brighter glow + a hue rotate make it shimmer. */
  .fx-linepreview-rainbow{
    border:3px solid transparent; border-radius:9px;
    background:linear-gradient(120deg,#ff5d5d,#ffb13d,#ffe93d,#5bd08b,#4fa3ff,#b86bff,#ff5d5d) border-box;
    -webkit-mask:linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor; mask:linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    mask-composite:exclude;
    box-shadow:0 0 12px 1px rgba(255,120,200,.6), inset 0 0 8px 0 rgba(140,200,255,.36);
    animation:linePreviewRainbow 1.4s ease-in-out infinite alternate; }
  /* PERF: the rainbow border already carries the full spectrum via its gradient; the continuous
     `filter:hue-rotate` (a per-frame filter re-raster on iOS during a drag) is dropped in favor of
     an opacity-only shimmer (compositor-only). The multicolor frame still reads as "2+ lines". */
  @keyframes linePreviewRainbow{
    0%{ opacity:.9; }
    100%{ opacity:1; } }

  /* praise banner sprite — SMOOTH glossy-candy entrance (task A): a soft scale-up from
     ~0.6 with a brief anticipation + ease-out-back OVERSHOOT that settles, an opacity +
     blur ramp (de-blurs as it lands), a hold, then a gentle rise + fade out. ~1s total.
     The keyframe is run on its own timeline (linear master timing-function so each cubic-
     bezier segment shapes its own ease) — no snap-in. */
  .fx-praise{ position:absolute; left:50%; top:40%; transform:translate(-50%,-50%);
    width:70%; max-width:300px; height:auto; pointer-events:none; will-change:transform,opacity,filter;
    filter:drop-shadow(0 6px 12px rgba(0,0,0,.45)); animation:praisePop 1s linear forwards; }
  @keyframes praisePop{
    /* anticipation: a hair small + soft, fading up */
    0%   { opacity:0;  transform:translate(-50%,-50%) scale(.6)  rotate(-5deg);
           filter:blur(6px) drop-shadow(0 6px 12px rgba(0,0,0,.0)); }
    12%  { opacity:.85; transform:translate(-50%,-50%) scale(.84) rotate(-2deg);
           filter:blur(2px) drop-shadow(0 6px 12px rgba(0,0,0,.3)); }
    /* ease-out-back OVERSHOOT — pops just past full size, glossy + crisp */
    34%  { opacity:1;  transform:translate(-50%,-53%) scale(1.14) rotate(2deg);
           filter:blur(0) drop-shadow(0 8px 16px rgba(0,0,0,.45)); }
    /* settle back to rest (the satisfying "land") */
    46%  { opacity:1;  transform:translate(-50%,-50%) scale(.98) rotate(-.5deg);
           filter:blur(0) drop-shadow(0 6px 12px rgba(0,0,0,.45)); }
    54%  { opacity:1;  transform:translate(-50%,-50%) scale(1)   rotate(0);
           filter:blur(0) drop-shadow(0 6px 12px rgba(0,0,0,.45)); }
    /* HOLD at rest */
    78%  { opacity:1;  transform:translate(-50%,-50%) scale(1)   rotate(0);
           filter:blur(0) drop-shadow(0 6px 12px rgba(0,0,0,.45)); }
    /* gentle rise + fade out */
    100% { opacity:0;  transform:translate(-50%,-74%) scale(1.02) rotate(0);
           filter:blur(1.5px) drop-shadow(0 6px 12px rgba(0,0,0,.0)); }
  }

  /* combo label sprite + number badge */
  .fx-combo{ position:absolute; left:50%; top:30%; transform:translate(-50%,-50%);
    display:flex; align-items:center; gap:4px; pointer-events:none; animation:comboPop 1s ease-out forwards; }
  .fx-combo-label{ width:120px; height:auto; filter:drop-shadow(0 4px 8px rgba(0,0,0,.4)); }
  .fx-combo-x{ font-size:30px; font-weight:900; color:#ffd23d; -webkit-text-stroke:2px #c9601a;
    text-shadow:0 3px 5px rgba(0,0,0,.5); }
  @keyframes comboPop{ 0%{ opacity:0; transform:translate(-50%,-50%) scale(.5);} 20%{ opacity:1; transform:translate(-50%,-50%) scale(1.15);} 30%{ transform:translate(-50%,-50%) scale(1);} 75%{ opacity:1;} 100%{ opacity:0; transform:translate(-50%,-66%) scale(1);} }

  /* confetti pool layer + shards (recycled <img>; physics in effects.js, L13) */
  .fx-confetti-layer{ position:absolute; inset:0; pointer-events:none; }
  /* PERF (iOS celebration, 2026-06-22): NO per-element filter:drop-shadow. The pooled
     confetti is up to 64 tiny continuously-MOVING <img>s — a per-element drop-shadow
     re-rasterizes each one EVERY frame on iOS Safari (off the GPU fast path), the
     classic stutter source ([[L13]]/L57). These specks are a few px; the shadow was
     invisible at that size. Transform/opacity only → pure compositor. */
  .fx-shard{ position:absolute; left:0; top:0; will-change:transform,opacity; }

  /* fragments-in-place + rainbow mini-blocks (CHANGE 2). The fragment is a small cube
     that briefly HOLDS at the cleared cell, then fades + falls a little (--fy/--fr).
     The rainbow block pops + tumbles outward to its landing point (--bx/--by/--br).
     Both are short-lived self-removing <img>s on this layer (no pool — few per clear). */
  .fx-fragment-layer{ position:absolute; inset:0; pointer-events:none; z-index:1; }
  /* PERF (iOS celebration, 2026-06-22): NO filter:drop-shadow. A multi-line clear spawns
     up to ~100 .fx-fragment cubes/sparkles at once (per-cleared-cell burst), ALL animating
     transform — a per-element drop-shadow forces a per-frame re-raster of every one on iOS
     Safari (the dominant cost the profile flagged: 102 filtered .fx-fragment at peak).
     Transform/opacity only now → compositor-only, no main-thread raster. */
  .fx-fragment{ position:absolute; left:0; top:0; will-change:transform,opacity;
    transform-origin:center; animation:fragRemain .3s ease-out forwards; }
  /* QUICK pop IN PLACE: appears small, grows a touch bigger, fades — no fall, no drift. */
  @keyframes fragRemain{
    0%{ opacity:0; transform:scale(.4); }
    25%{ opacity:1; transform:scale(.8); }
    100%{ opacity:0; transform:scale(1.05); } }

  /* THUMBS-UP reward (USER REQ 2026-06-22 따봉): one small block-colored thumb per placed cell of
     a gap-correct drop. A tiny icon scales UP from nothing with a quick overshoot, holds, then
     fades — ~2s total. Per-cell (effects.js positions each to its cell rect); tint is baked into
     the sprite per block color so this is opacity/scale-only (smooth on phones). */
  .fx-thumb-layer{ position:absolute; inset:0; pointer-events:none; z-index:4; }
  .fx-thumb{ position:absolute; left:0; top:0; will-change:transform,opacity; transform-origin:50% 80%;
    filter:drop-shadow(0 2px 3px rgba(0,0,0,.28)); animation:thumbPop .8s ease-out forwards; }
  /* USER REQ 2026-06-22: the 따봉 enters from ABOVE and swings DOWN in a slight ARC (like a hand
     bringing a thumbs-up down), tilting from a lean into upright, while it pops + then fades (~1s). */
  @keyframes thumbPop{
    0%{   opacity:0; transform:translateY(-55%) rotate(-22deg) scale(.3); }
    20%{  opacity:1; transform:translateY(8%)   rotate(6deg)   scale(1.2); }  /* swing down past, overshoot */
    34%{            transform:translateY(0)     rotate(0deg)   scale(1.0); }  /* settle upright */
    60%{  opacity:1; transform:translateY(0)     rotate(0deg)   scale(1.0); } /* brief hold */
    100%{ opacity:0; transform:translateY(-6%)  rotate(-3deg)  scale(1.06); } /* lift + fade out */ }

  /* CONTAINED LINE-CLEAR BURST (user 2026-06-18): the cleared-line read must stay INSIDE,
     and FILL, the cleared row/col. effects.js builds ONE .fx-lineburst per cleared line
     sized to that line's rect; overflow:hidden CLIPS every child to the line, so nothing
     can spill sideways outside the cleared line (the containment guarantee). Inside it:
     a BLOCK-COLORED soft glow that fills the line (--glow = the cleared block hue, NOT
     white) and fades fast, plus many small .fx-fragment cubes + .fx-spark sparkles that
     pop in place across the FULL line. Self-removing (effects.js). */
  .fx-lineburst{ position:absolute; pointer-events:none; overflow:hidden;
    border-radius:7px; --glow:74,150,255; }
  /* soft block-colored fill glow over the whole line — radial center→edges, fades fast.
     mix-blend screen keeps it additive over the blocks; tinted to --glow (the block color). */
  /* PERF (iOS celebration, 2026-06-22): NO mix-blend-mode:screen (off iOS Safari's GPU
     fast path — it re-reads + recomposites the backdrop each frame). The additive "screen"
     look is baked into the gradient instead: a bright near-white core + the block-color
     bloom on a transparent edge reads the same over the dark board WITHOUT the blend mode.
     The per-frame filter:brightness in the keyframe is also gone (re-raster every frame) —
     the punch now comes from a brighter start color + scale pop (transform/opacity only). */
  .fx-lineburst-glow{ position:absolute; inset:0; border-radius:inherit;
    background:radial-gradient(closest-side,
      rgba(255,255,255,.95), rgba(var(--glow),.9) 42%, rgba(var(--glow),0) 100%);
    will-change:opacity,transform;
    animation:lineBurstGlow .4s ease-out forwards; }
  /* PUNCHY flash: bright + scale pop at the very start (the "blast"), then a fast fade —
     reads as a satisfying burst. Transform/opacity ONLY (no per-frame filter re-raster). */
  @keyframes lineBurstGlow{
    0%{ opacity:0; transform:scale(.55); }
    12%{ opacity:1; transform:scale(1.2); }
    40%{ opacity:.92; transform:scale(1); }
    100%{ opacity:0; transform:scale(.98); } }
  /* sparkle accents inside the burst — NO per-element drop-shadow (re-rasters each of the
     many spark <img>s every frame on iOS). The sprite itself already reads bright. */
  .fx-lineburst .fx-spark{ }
  /* line-burst fragments BLAST outward ALONG the line axis (--fbx/--fby set per fragment
     in JS) — clipped to the line container, so the energetic motion still can't escape the
     cleared line. This is the "통쾌" upgrade over the static in-place pop. */
  .fx-lineburst .fx-frag-burst{ animation-name:fragBurst; }
  @keyframes fragBurst{
    0%{ opacity:0; transform:translate(0,0) scale(.5) rotate(0); }
    16%{ opacity:1; transform:translate(calc(var(--fbx,0)*.4),calc(var(--fby,0)*.4)) scale(1.25) rotate(calc(var(--fr,0)*.4)); }
    100%{ opacity:0; transform:translate(var(--fbx,0),var(--fby,0)) scale(.82) rotate(var(--fr,0)); } }
  /* 2+ line clear: keep the rainbow FLAVOR but still clipped to the line (no outward burst).
     The glow shimmers across hues while staying inside the container. */
  .fx-lineburst-multi .fx-lineburst-glow{
    background:radial-gradient(closest-side,
      rgba(255,255,255,.95), rgba(var(--glow),.6) 55%, rgba(var(--glow),0) 100%);
    animation:lineBurstGlowMulti .5s ease-out forwards; }
  /* transform/opacity ONLY — the per-frame filter:hue-rotate (re-raster every frame on iOS)
     is removed; the rainbow flavor of a 2+ clear comes from the RAINBOW WAVE, not this glow. */
  @keyframes lineBurstGlowMulti{
    0%{ opacity:0; transform:scale(.9); }
    22%{ opacity:1; transform:scale(1.04); }
    100%{ opacity:0; transform:scale(1); } }

  /* RAINBOW SWEEP (task C — the 2+ line clear CENTERPIECE). effects.js (_rainbowWaveBurst)
     lays ONE rainbow-gradient overlay over the cleared cells' BOUNDING BOX, clipped to it, and
     SWEEPS it across (transform-only travel) from the placed piece outward, then the box flashes
     and fades. This REPLACES the old per-cell snapshot wave (one <div>+<img> per cleared cell →
     ~130 live #fx els on a 6-line clear → frame drops on iPhone, ⑫/2026-06-23). Now the whole
     centerpiece is a HANDFUL of compositor-only elements + a hard-capped particle spray. */
  /* the BOX = the cleared region's bounds; overflow:hidden CLIPS the sweep to the cleared cells
     so it can never bleed onto live blocks. z above the board, below banners. */
  .fx-rainbowsweep{ position:absolute; pointer-events:none; z-index:2; overflow:hidden;
    border-radius:6px; }
  /* THE SWEEP: ONE element with a STATIC pre-baked rainbow linear-gradient (painted once — NO
     per-frame background-position recompute, so no paint churn). It is sized 2× the box along
     the travel axis and only its TRANSFORM (translate) + OPACITY animate, both on the GPU
     compositor fast path — NO filter, NO mix-blend-mode, NO mask (all off iOS Safari's fast
     path and the cause of the stutter, ⑫). --rs-from/--rs-to (set per-clear in JS) carry the
     travel start/end so the rainbow enters from the placed piece's side and exits the far edge. */
  .fx-rs-grad{ position:absolute; top:-20%; left:-20%; width:140%; height:140%;
    will-change:transform,opacity; opacity:0; }
  .fx-rs-h{ background:linear-gradient(90deg,
      #FF3B30 0%, #FF9500 16%, #FFCC00 32%, #34C759 50%, #2E9BFF 66%, #5B5BFF 82%, #A66BFF 100%);
    animation-name:rsSweepH; }
  .fx-rs-v{ background:linear-gradient(180deg,
      #FF3B30 0%, #FF9500 16%, #FFCC00 32%, #34C759 50%, #2E9BFF 66%, #5B5BFF 82%, #A66BFF 100%);
    animation-name:rsSweepV; }
  /* travel across the box along the longer axis (transform only). Fades in as it enters and out
     as it leaves so the rainbow visibly SWEEPS through the cleared lines, not just appears.
     --rs-from/--rs-to are px offsets set per-clear in JS (signed toward the placed-piece side). */
  @keyframes rsSweepH{
    0%{   opacity:0;   transform:translate3d(var(--rs-from,0),0,0); }
    22%{  opacity:.92; }
    78%{  opacity:.92; }
    100%{ opacity:0;   transform:translate3d(var(--rs-to,0),0,0); } }
  @keyframes rsSweepV{
    0%{   opacity:0;   transform:translate3d(0,var(--rs-from,0),0); }
    22%{  opacity:.92; }
    78%{  opacity:.92; }
    100%{ opacity:0;   transform:translate3d(0,var(--rs-to,0),0); } }
  /* FLASH: ONE soft white pulse over the whole box (opacity only) — the "lines flash" beat,
     with zero per-cell DOM. Brightens as the sweep passes, then fades out. */
  .fx-rs-flash{ position:absolute; inset:0; will-change:opacity; opacity:0;
    background:radial-gradient(closest-side, rgba(255,255,255,.85), rgba(255,255,255,.18) 70%, rgba(255,255,255,0) 100%); }
  @keyframes rsFlash{
    0%{ opacity:0; }
    30%{ opacity:.9; }
    60%{ opacity:.5; }
    100%{ opacity:0; } }

  /* BOARD SHAKE on clear (juice) — the board canvas jitters briefly; intensity scales with
     how many lines cleared (1 subtle → 4 punchy). Only the board shakes (HUD/tray steady). */
  #board{ will-change:transform; }
  .fx-shake-1{ animation:bbShake1 .2s ease-out; }
  .fx-shake-2{ animation:bbShake2 .26s ease-out; }
  .fx-shake-3{ animation:bbShake3 .3s ease-out; }
  .fx-shake-4{ animation:bbShake4 .34s ease-out; }
  @keyframes bbShake1{ 0%,100%{transform:translate(0,0)} 30%{transform:translate(.5px,2px)} 65%{transform:translate(-.5px,-1.5px)} }
  @keyframes bbShake2{ 0%,100%{transform:translate(0,0)} 20%{transform:translate(1px,3px)} 45%{transform:translate(-1.5px,-2.5px)} 72%{transform:translate(1px,1.5px)} }
  @keyframes bbShake3{ 0%,100%{transform:translate(0,0)} 16%{transform:translate(-2px,4px)} 42%{transform:translate(2.5px,-3.5px)} 68%{transform:translate(-1.5px,2.5px)} }
  @keyframes bbShake4{ 0%,100%{transform:translate(0,0)} 14%{transform:translate(3px,-5.5px)} 38%{transform:translate(-3.5px,4.5px)} 62%{transform:translate(2.5px,-3px)} 84%{transform:translate(-1.5px,1.5px)} }

  .fx-rainblock{ position:absolute; left:0; top:0; will-change:transform,opacity;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,.4)); transform-origin:center;
    animation:rainBlockPop .76s cubic-bezier(.18,.7,.3,1) forwards; }
  @keyframes rainBlockPop{
    0%{ opacity:0; transform:translate(0,0) scale(.4) rotate(0); }
    22%{ opacity:1; transform:translate(calc(var(--bx,0)*.5),calc(var(--by,0)*.5)) scale(1.18) rotate(calc(var(--br,0)*.5)); }
    100%{ opacity:0; transform:translate(var(--bx,0),var(--by,0)) scale(1) rotate(var(--br,0)); } }

  /* flying collect gems: <img> tweened (JS) from the cleared cell up to the mission
     counter chip; the DISPLAYED count ticks down on arrival (effects.js _collectGems). */
  .fx-gemfly-layer{ position:absolute; inset:0; pointer-events:none; z-index:2; }
  .fx-gemfly{ position:absolute; left:0; top:0; will-change:transform,opacity;
    filter:drop-shadow(0 3px 5px rgba(0,0,0,.45)); }
  /* tiny pop on the counter chip when a gem arrives (count just changed) */
  .gem-chip.arrive img{ animation:gemChipPop .3s ease-out; }
  @keyframes gemChipPop{ 0%{ transform:scale(1);} 40%{ transform:scale(1.35);} 100%{ transform:scale(1);} }
  /* score-bar MARKER pulse when a +N fly LANDS (the points "arrive") */
  .score-track .marker.arrive{ animation:scoreMarkerPop .26s ease-out; }
  @keyframes scoreMarkerPop{ 0%{ transform:translate(-50%,-50%) scale(1);} 45%{ transform:translate(-50%,-50%) scale(1.32);} 100%{ transform:translate(-50%,-50%) scale(1);} }

  /* ── GOAL-CONFIRM beat (user req 2026-06-18): a clean, satisfying "goal met!" emphasis on
     the goal HUD that plays AFTER the goal juice and BEFORE the stage-clear grid sweep — so
     the player clearly registers the clear. #mission (the score track OR the gem chips) pops
     + glows; a ✓ stamp pops over it; gem chips flash "done". All self-removed after the beat. */
  #mission.goal-confirm{ animation:goalConfirmPop .82s cubic-bezier(.22,1.4,.4,1) both; }
  @keyframes goalConfirmPop{
    0%{ transform:scale(1); filter:drop-shadow(0 0 0 rgba(255,224,120,0)); }
    28%{ transform:scale(1.18); filter:drop-shadow(0 0 16px rgba(255,224,120,.95)); }
    52%{ transform:scale(1.05); filter:drop-shadow(0 0 9px rgba(255,224,120,.55)); }
    100%{ transform:scale(1); filter:drop-shadow(0 0 0 rgba(255,224,120,0)); } }
  .gem-chip.confirm{ animation:goalChipFlash .72s ease-out both; }
  @keyframes goalChipFlash{ 0%{ filter:brightness(1);} 35%{ filter:brightness(1.85) drop-shadow(0 0 10px rgba(120,255,170,.9));} 100%{ filter:brightness(1);} }
  /* ✓ stamp — left/top are set INLINE (centered on the score circle / gem icon, user req ⑧);
     transform centers it on that point. */
  .goal-check{ position:absolute; transform:translate(-50%,-50%) scale(.3);
    font-size:30px; font-weight:900; color:#2bd472; opacity:0; pointer-events:none; z-index:7;
    text-shadow:0 2px 6px rgba(0,0,0,.45), 0 0 18px rgba(120,255,170,.95);
    animation:goalCheckPop .82s cubic-bezier(.22,1.5,.4,1) both; }
  @keyframes goalCheckPop{
    0%{ opacity:0; transform:translate(-50%,-50%) scale(.3); }
    30%{ opacity:1; transform:translate(-50%,-50%) scale(1.25); }
    62%{ opacity:1; transform:translate(-50%,-50%) scale(1); }
    100%{ opacity:1; transform:translate(-50%,-50%) scale(1); } }   /* ㊼ HOLD the ✓ (persists till stage advances) */

  /* ── SCORE-GAIN "+N" popups (score/combo stages) — tiered by gain magnitude ──
     A "+N" pops at the gain spot (POP keyframe scaled by tier), holds, then a JS rAF
     tween flies it INTO the top score-bar marker (shrinking + fading). The layer sits
     ABOVE the gem-fly layer. Each tier is visibly DIFFERENT (size + glow + pop) so the
     player reads how big the gain was: place < t1 < t2 < t3 < t4. Glossy-candy vibe to
     match the blocks / the "Good" praise banners. */
  .fx-scoregain-layer{ position:absolute; inset:0; pointer-events:none; z-index:3; }
  .fx-scoregain{ position:absolute; transform:translate(-50%,-50%); font-weight:900;
    color:#ffd23d; -webkit-text-stroke:1.5px #c9601a; paint-order:stroke fill;
    letter-spacing:.5px;
    text-shadow:0 2px 4px rgba(0,0,0,.55), 0 0 8px rgba(255,194,61,.55);
    will-change:transform,opacity; white-space:nowrap; line-height:1; }
  /* during the FLIGHT the JS owns transform/left/top — kill the pop animation so it
     doesn't fight the tween, and trim the heavy glow as it shrinks into the bar. */
  .fx-scoregain.fx-sg-flying{ animation:none !important; }
  /* PLACE — tiny + subtle (a plain block drop) */
  .fx-sg-place{ font-size:16px; -webkit-text-stroke-width:1px;
    animation:sgPop .2s ease-out; }
  /* T1 — 1-line clear, medium */
  .fx-sg-t1{ font-size:22px; animation:sgPop .22s ease-out; }
  /* T2 — 2-line clear, bigger + warm glow */
  .fx-sg-t2{ font-size:30px; color:#ffe08a;
    text-shadow:0 2px 5px rgba(0,0,0,.55), 0 0 12px rgba(255,170,40,.75);
    animation:sgPopBig .26s cubic-bezier(.2,1.5,.4,1); }
  /* T3 — 3-line clear, large + colored cyan glow */
  .fx-sg-t3{ font-size:40px; color:#bff3ff; -webkit-text-stroke:2px #1f7fa8;
    text-shadow:0 3px 6px rgba(0,0,0,.5), 0 0 18px rgba(90,200,255,.9);
    animation:sgPopBig .3s cubic-bezier(.2,1.6,.35,1); }
  /* T4 — 4+/huge, biggest + rainbow flair + extra spin-pop */
  .fx-sg-t4{ font-size:52px; color:#fff; -webkit-text-stroke:2.5px rgba(120,40,160,.9);
    background:linear-gradient(90deg,#ff5c5c,#ffb43a,#ffe23d,#5ad27a,#5aa0ff,#b06bff);
    -webkit-background-clip:text; background-clip:text;
    text-shadow:0 0 22px rgba(255,120,220,.9), 0 4px 8px rgba(0,0,0,.5);
    animation:sgPopHuge .36s cubic-bezier(.2,1.7,.3,1); }
  @keyframes sgPop{ 0%{ opacity:0; transform:translate(-50%,-50%) scale(.5);} 50%{ opacity:1; transform:translate(-50%,-50%) scale(1.12);} 100%{ opacity:1; transform:translate(-50%,-50%) scale(1);} }
  @keyframes sgPopBig{ 0%{ opacity:0; transform:translate(-50%,-50%) scale(.4);} 55%{ opacity:1; transform:translate(-50%,-50%) scale(1.25);} 100%{ opacity:1; transform:translate(-50%,-50%) scale(1);} }
  @keyframes sgPopHuge{ 0%{ opacity:0; transform:translate(-50%,-50%) scale(.3) rotate(-8deg);} 45%{ opacity:1; transform:translate(-50%,-50%) scale(1.35) rotate(4deg);} 70%{ transform:translate(-50%,-50%) scale(1.05) rotate(-1deg);} 100%{ opacity:1; transform:translate(-50%,-50%) scale(1) rotate(0);} }
  /* 3+ line clears: while the number COUNTS UP (1 → value), it heartbeats so it reads big &
     alive; the pulse stops the instant it starts flying (.fx-sg-flying). */
  .fx-scoregain.fx-sg-countup:not(.fx-sg-flying){ animation:sgCountPulse .22s ease-in-out infinite alternate; }
  @keyframes sgCountPulse{ 0%{ opacity:1; transform:translate(-50%,-50%) scale(1);} 100%{ opacity:1; transform:translate(-50%,-50%) scale(1.16);} }

  /* (stage-clear celebration is the SEQUENCE built in #fx by effects.js — see the
     .fx-stageclear-layer / .fx-welldone styles further down. The old popup card
     (panel/burst/STAGE-CLEAR title/3-star rating) was superseded and removed;
     effects._stageClear() is a no-op — the host drives playStageClear().) */

  /* game-over banner (fallback text overlay). z-index:10 so the DIM sits ABOVE the board FILL
     (㉑) — .fx-fragment-layer has its own z:1 context, so without this the fill blocks popped
     IN FRONT of the dim. A lighter dim so the filled board reads through it. */
  .fx-banner{ position:absolute; inset:0; z-index:10; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(8,14,40,.72); pointer-events:auto; animation:fade .25s ease-out; }
  .fx-banner-title{ font-size:34px; font-weight:900; color:var(--accent); }
  .fx-banner.fx-fail .fx-banner-title{ color:#ff6b6b; }
  .fx-banner-sub{ font-size:16px; color:var(--hud-dim); margin-top:6px; }
  .fx-banner::after{ content:'Tap to restart'; position:absolute; bottom:18%; font-size:13px; color:var(--hud-dim); }
  /* ⑩ game-over: empty board cells FILL IN rising from the bottom (opacity/transform only →
     smooth), then "No Space Left" sits in the tray area while the queue is cleared. */
  .fx-gameover-fill{ position:absolute; inset:0; pointer-events:none; z-index:3; }
  .fx-go-block{ position:absolute; opacity:0; will-change:transform,opacity; }
  @keyframes goBlockPop{ 0%{ opacity:0; transform:translateY(55%);} 60%{ opacity:1;} 100%{ opacity:1; transform:translateY(0);} }
  #tray{ position:relative; }
  #no-space{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:26px; font-weight:900; letter-spacing:.5px; color:rgba(40,52,84,.4);
    text-shadow:0 1px 1px rgba(255,255,255,.6); pointer-events:none; z-index:6; animation:fade .3s ease-out; }
  @keyframes fade{ from{opacity:0;} to{opacity:1;} }

  /* ── onboarding tutorial (PLACEHOLDER look — replaced by API assets later (GLOBAL C6/C7)) ── */
  #tut{ position:absolute; inset:0; z-index:45; pointer-events:none; display:none; }
  /* (dim overlay removed per user — keep only the banner + hand, no darkening) */
  #tut-dim{ position:absolute; inset:0; background:transparent; }
  /* instruction banner near the top of the board area */
  #tut-banner{ position:absolute; left:50%; top:13%; transform:translateX(-50%);
    max-width:84%; padding:10px 18px; border-radius:18px; text-align:center;
    background:linear-gradient(180deg,#2a3b66,#1a2748); border:2px solid #4a63a8;
    color:#fff; font-weight:800; font-size:16px; line-height:1.25;
    box-shadow:0 6px 18px rgba(0,0,0,.45); animation:tutBannerIn .25s ease-out; }
  #tut-banner::after{ content:''; position:absolute; left:50%; bottom:-9px; transform:translateX(-50%);
    border:8px solid transparent; border-top-color:#1a2748; }
  @keyframes tutBannerIn{ from{ opacity:0; transform:translate(-50%,-6px) scale(.9);} to{ opacity:1; } }
  /* animated finger pointer: API hand sprite (ui_hand.webp). Same animation path as
     before (tutorial.js drives #tut-finger transform); the hand img is anchored at
     its fingertip (top-center) so it points at the target. A press pulse ring fires
     on the .tut-finger-press class. */
  #tut-finger{ position:absolute; left:0; top:0; width:54px; height:54px; margin:-6px 0 0 -16px;
    display:none; will-change:transform; }
  #tut-finger .hand{ position:absolute; inset:0; width:100%; height:100%; object-fit:contain;
    filter:drop-shadow(0 4px 6px rgba(0,0,0,.45)); }
  #tut-finger .ring{ position:absolute; left:50%; top:6px; width:30px; height:30px; margin:-15px 0 0 -15px;
    border-radius:50%; border:3px solid rgba(255,255,255,.85); box-shadow:0 0 0 4px rgba(80,140,255,.35); opacity:0; }
  #tut-finger.tut-finger-press .ring{ animation:tutPress .35s ease-out; }
  @keyframes tutPress{ 0%{ transform:scale(.6); opacity:.9;} 100%{ transform:scale(1.6); opacity:0;} }
  /* highlight the active tray slot during the tutorial */
  .tray-slot.tut-hi{ box-shadow:0 0 0 3px var(--accent), 0 0 18px rgba(255,194,61,.6);
    background:rgba(255,194,61,.12); animation:tutHi 1.1s ease-in-out infinite; }
  @keyframes tutHi{ 0%,100%{ box-shadow:0 0 0 3px var(--accent), 0 0 14px rgba(255,194,61,.45);} 50%{ box-shadow:0 0 0 3px var(--accent), 0 0 24px rgba(255,194,61,.8);} }

  /* ── STAGE-CLEAR SEQUENCE (redesign 2026-06-18) — replaces the old popup card. The
     grid sweep + Well Done layer DOM is built inside #fx by effects.js (playStageClear);
     these are the styles for those classes. #next-wrap is now an INVISIBLE state marker
     (no visible card, no dim backdrop): the host toggles `.show` on it while the Well
     Done layer is up so QA/solver can detect the sequence via the same SSOT selector.
     The #next-btn lives in #next-wrap at rest and is MOUNTED into the Well Done layer
     after the text reveal. Advancement stays BUTTON-ONLY (NEXT runs gotoStage). */
  #next-wrap{ position:absolute; width:0; height:0; overflow:hidden; pointer-events:none; }
  #next-wrap.show{ /* state marker only — the visuals live in the #fx Well Done layer */ }

  /* (1) GRID SWEEP — a traveling neon glow over each board cell, row by row, alternating
     direction (driven by timed spawns in effects.js). Each cell uses the fx_lineglow
     sprite tinted neon-cyan/blue (matches clear_grid_sweep.png), screen-blended additive
     over the board, popping in then fading out. */
  .fx-stageclear-layer{ position:absolute; inset:0; pointer-events:none; z-index:50; }
  .fx-sweep-layer{ position:absolute; inset:0; pointer-events:none; }
  /* SOFTENED (user req ⑱: the clear "빛줄기" hurt the eyes) — much lower peak opacity + no
     brightness boost + gentler saturation; dropped the screen blend (harsh on the white board). */
  .fx-sweep-cell{ position:absolute; pointer-events:none; object-fit:fill;
    filter:sepia(1) saturate(3) hue-rotate(150deg) brightness(1.0);
    animation:sweepGlow .36s ease-out forwards; }
  @keyframes sweepGlow{ 0%{ opacity:0; transform:scale(.86);} 30%{ opacity:.38; transform:scale(1.04);} 100%{ opacity:0; transform:scale(1);} }

  /* ㊹ VIVID 가로세로 SWEEP BEAMS (USER REQ 2026-06-19 "색감 훨씬 진하게 + 그리드 높이 채움"):
     full-WIDTH row beams + full-HEIGHT column beams that fill the grid. Deep saturated colour
     (cyan/blue 가로, violet/cyan 세로) at high opacity + a soft glow — punchy, not the faint
     per-cell glow. Fired at the last placement (effects.playSweep). */
  .fx-beam{ position:absolute; pointer-events:none; border-radius:4px; opacity:0; will-change:opacity,transform; }
  .fx-beam-h{ background:linear-gradient(90deg, rgba(0,209,255,0), rgba(0,209,255,.92) 16%, rgba(64,132,255,.96) 50%, rgba(0,209,255,.92) 84%, rgba(0,209,255,0));
    box-shadow:0 0 18px 4px rgba(0,196,255,.55); animation:beamH .52s ease-out forwards; }
  .fx-beam-v{ background:linear-gradient(180deg, rgba(150,84,255,0), rgba(150,84,255,.92) 16%, rgba(0,209,255,.96) 50%, rgba(150,84,255,.92) 84%, rgba(150,84,255,0));
    box-shadow:0 0 18px 4px rgba(130,120,255,.5); animation:beamV .52s ease-out forwards; }
  @keyframes beamH{ 0%{ opacity:0; transform:scaleX(.55);} 22%{ opacity:.88;} 100%{ opacity:0; transform:scaleX(1);} }
  @keyframes beamV{ 0%{ opacity:0; transform:scaleY(.55);} 22%{ opacity:.9;} 100%{ opacity:0; transform:scaleY(1);} }

  /* ㊻ WIN-CLEAR CHOREOGRAPHY: (at placement) blocks fall + confetti → horizontal rainbow zigzag → result */
  .fx-win-layer{ position:absolute; inset:0; pointer-events:none; }
  /* B1) the cleared blocks tumble DOWN past the board */
  .fx-winfall{ position:absolute; pointer-events:none; transform-origin:center; will-change:transform,opacity;
    animation:winFall .64s cubic-bezier(.4,.08,.7,1) forwards; }
  @keyframes winFall{ 0%{ transform:translate(0,0) rotate(0); opacity:1;} 12%{ opacity:1;} 100%{ transform:translate(var(--tx),var(--fall)) rotate(var(--rot)); opacity:0;} }
  /* B2) confetti raining from the top over the board */
  .fx-win-rain{ position:absolute; overflow:hidden; pointer-events:none; }
  .fx-win-shard{ position:absolute; left:0; top:0; will-change:transform; }
  /* C) zigzag RAINBOW beams (recolour of the fx-beam gradient per --hue) + a glowing frame */
  .fx-rzig-frame{ position:absolute; pointer-events:none; border-radius:14px;

  .fx-beam-rb.fx-beam-h{ background:linear-gradient(90deg, hsla(var(--hue),95%,58%,0), hsla(var(--hue),95%,58%,.95) 50%, hsla(var(--hue),95%,58%,0)) !important;
    box-shadow:0 0 16px 3px hsla(var(--hue),95%,60%,.55) !important; }
  .fx-beam-rb.fx-beam-v{ background:linear-gradient(180deg, hsla(var(--hue),95%,58%,0), hsla(var(--hue),95%,58%,.9) 50%, hsla(var(--hue),95%,58%,0)) !important;
    box-shadow:0 0 12px 2px hsla(var(--hue),95%,60%,.4) !important; }

  /* (2) WELL DONE layer — an overlay ON the board (NOT a card). Fades in after the sweep;
     holds the Lv badges + bar at the top, confetti raining from the top, decorative
     center gems, and the "Well Done!" banner revealed left→right. */
  .fx-welldone{ position:absolute; inset:0; pointer-events:none; opacity:0;

  .fx-welldone.show{ opacity:1; }
  /* full-screen DIM backdrop — only the celebration (badges/gems/text/confetti/button)
     rises above it (task #3). pointer-events:auto so taps on the dimmed game are blocked. */
  .wd-dim{ position:absolute; inset:0; z-index:0; background:rgba(6,10,24,.82); pointer-events:auto; }

  /* top: Lv.N badge (left) — progress bar — Lv.N+1 badge (right), near the top. */
  .wd-top{ position:absolute; left:6%; right:6%; top:13%; z-index:2;
    display:flex; align-items:center; gap:8px; }
  .wd-lv{ flex:0 0 auto; padding:5px 12px; border-radius:13px; white-space:nowrap;
    font-weight:900; font-size:15px; color:#fff;
    background:linear-gradient(180deg,#5b8cff,#3a63d8);
    border:2px solid rgba(255,255,255,.85);
    box-shadow:0 3px 7px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.45);
    text-shadow:0 2px 3px rgba(0,0,0,.4); }
  .wd-lv.wd-lv-complete{ background:linear-gradient(180deg,#ffd86b,#ffae1f); color:#5a3700; }
  .wd-lv.blink{ animation:wdBlink 1s ease-in-out infinite; }
  @keyframes wdBlink{ 0%,100%{ filter:brightness(1);} 50%{ filter:brightness(1.5);} }
  /* the rapid-fill progress bar (empty → 100% in BAR_FILL ms, then FLASH at full). */
  .wd-bar{ flex:1 1 auto; position:relative; height:18px; border-radius:10px;
    background:linear-gradient(180deg,rgba(8,16,40,.6),rgba(8,16,40,.35));
    border:2px solid rgba(255,255,255,.55);
    box-shadow:inset 0 2px 4px rgba(0,0,0,.5); overflow:hidden; }
  /* while filling: PURPLE (task #4). */
  .wd-fill{ position:absolute; left:0; top:0; bottom:0; width:0%;
    border-radius:8px; background:linear-gradient(180deg,#d7a6ff,#9b4dff 60%,#7a2bff);

  @keyframes wdBarFlash{ 0%{ box-shadow:inset 0 2px 4px rgba(0,0,0,.5), 0 0 0 0 rgba(255,235,150,0);}
    40%{ box-shadow:inset 0 0 0 0 #fff, 0 0 22px 8px rgba(255,235,150,.95);}
    100%{ box-shadow:inset 0 2px 4px rgba(0,0,0,.5), 0 0 0 0 rgba(255,235,150,0);} }
  /* at full: the fill cycles orange→red→blue→green→purple, BLINKING (bright pulse) at

  .wd-bar.cycle .wd-fill{ animation:wdFillCycle .7s steps(1,end) forwards; }
  @keyframes wdFillCycle{
    0%  { background:linear-gradient(180deg,#ffd27a,#ff9d12 60%,#ff7a00); filter:brightness(1.9); }
    10% { filter:brightness(1); }
    20% { background:linear-gradient(180deg,#ff9a9a,#ff4d4d 60%,#e62e2e); filter:brightness(1.9); }
    30% { filter:brightness(1); }
    40% { background:linear-gradient(180deg,#9ec2ff,#4d8bff 60%,#2e6be6); filter:brightness(1.9); }
    50% { filter:brightness(1); }

    100%{ background:linear-gradient(180deg,#d7a6ff,#9b4dff 60%,#7a2bff); filter:brightness(1); } }

  /* confetti raining from the TOP across the WHOLE width (recycled pool in effects.js). */
  .wd-rain{ position:absolute; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
  /* PERF (iOS celebration, 2026-06-22): NO drop-shadow — the Well-Done rain is a 40-element
     pool that falls continuously for the whole result screen; a per-element shadow re-rasters
     each one every frame on iOS. Transform-only → compositor-only (same as .fx-shard). */
  .wd-shard{ position:absolute; left:0; top:0; display:none; will-change:transform; }

  /* decorative center gems (blue diamond, red star, purple starburst — pop in). */

    width:62%; display:flex; align-items:center; justify-content:center; gap:4%; }
  .wd-gem{ width:26%; height:auto; opacity:0; transform:scale(.3) rotate(-12deg);
    filter:drop-shadow(0 4px 7px rgba(0,0,0,.4)); }
  .wd-gem-gem_diamond{ width:34%; margin-bottom:8%; } /* center gem a touch bigger/higher */
  .wd-gems.show .wd-gem{ animation:wdGemPop .38s cubic-bezier(.2,1.7,.4,1) forwards; }
  .wd-gems.show .wd-gem-gem_diamond{ animation-delay:.06s; }
  .wd-gems.show .wd-gem-gem_star6{ animation-delay:.12s; }
  @keyframes wdGemPop{ 0%{ opacity:0; transform:scale(.3) rotate(-12deg);} 60%{ opacity:1; transform:scale(1.18) rotate(5deg);} 100%{ opacity:1; transform:scale(1) rotate(0);} }

  /* "Well Done!" as PER-LETTER text (task #4) — each char pops small→big, staggered
     (animation-delay set inline per char). Replaces the old single-image banner wipe. */
  .wd-text{ position:absolute; left:0; right:0; top:58%; z-index:2; text-align:center;
    pointer-events:none; font-weight:900; font-size:40px; letter-spacing:1px; color:#eaf3ff;
    text-shadow:0 3px 0 rgba(40,90,200,.6), 0 7px 16px rgba(0,0,0,.5); }
  .wd-char{ display:inline-block; opacity:0; transform:scale(.2); transform-origin:center; }
  .wd-text.reveal .wd-char{ animation:wdCharPop .34s cubic-bezier(.2,1.7,.4,1) both; }
  @keyframes wdCharPop{ 0%{ opacity:0; transform:scale(.2);} 55%{ opacity:1; transform:scale(1.28);} 100%{ opacity:1; transform:scale(1);} }

  /* button slot near the bottom (lowered per task #4); #next-btn mounts here last. */
  .wd-btnslot{ position:absolute; left:50%; bottom:9%; transform:translateX(-50%); z-index:3;
    display:flex; justify-content:center; pointer-events:none; }
  /* glossy "Next Stage" button — hidden until effects.js adds .sc-show (after the wipe). */
  #next-btn{ padding:12px 38px; border:none; border-radius:24px;
    background:linear-gradient(180deg,#ffd86b,#ffb01f); color:#3a2600; font-weight:900; font-size:18px;
    cursor:pointer; pointer-events:auto; white-space:nowrap;

  #next-btn:active{ transform:translateY(3px); box-shadow:0 3px 0 #c9871a, 0 6px 12px rgba(0,0,0,.4); }
  @keyframes btnIn{ from{ opacity:0; transform:translateY(14px) scale(.85);} to{ opacity:1; transform:translateY(0) scale(1);} }

<body>
  <div id="bg"></div>
  <div id="stage">
    <!-- invisible secret hotspot: 3 quick taps in the in-game top-left corner toggle the
         dev stage selector (hidden by default, no on-screen hint — USER REQ 2026-06-22). -->
    <div id="dev-hotspot" aria-hidden="true"></div>
    <!-- DEV stage selector (top-right): prev / current / next to quickly browse stages.
         Hidden until the secret hotspot reveals it. Wired to the same gotoStage(). -->
    <div id="dev-stage" aria-label="Stage selector (dev)">
      <button id="dev-prev" title="Previous stage" aria-label="Previous stage">◀</button>
      <button id="dev-label" title="Tap to jump to a stage">Lv.1</button>
      <button id="dev-next" title="Next stage" aria-label="Next stage">▶</button>
    </div>

    <!-- the goal HUD lives INSIDE board-wrap, DIRECTLY ABOVE the grid (user req: attach
         the goal UI to the top of the grid, much lower than the screen top). -->
    <div id="board-wrap">
      <div id="hud-top">
        <div id="row1">
          <div id="mission"></div>
          <div id="score">0</div>
        </div>
        <div id="combo"></div>
      </div>
      <canvas id="board"></canvas>
    </div>

    <div id="tray">
      <div class="tray-slot" data-i="0"><canvas></canvas></div>
      <div class="tray-slot" data-i="1"><canvas></canvas></div>
      <div class="tray-slot" data-i="2"><canvas></canvas></div>
    </div>

    <div id="fx"></div>

    <!-- onboarding tutorial overlay (PLACEHOLDER look — replaced by API assets later (GLOBAL C6/C7)) -->
    <div id="tut">
